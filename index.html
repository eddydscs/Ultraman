<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>赛罗奥特曼英语大作战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 50%, #0f2040 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        .container { max-width: 500px; margin: 0 auto; padding: 15px; position: relative; z-index: 1; }
        
        @media (min-width: 768px) {
            .container { max-width: 100%; width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; }
            .card { width: 90%; max-width: 550px; }
        }
        
        .zero-header { text-align: center; padding: 15px 0; }
        .zero-icon { font-size: 80px; animation: zeroPulse 2s infinite; display: inline-block; filter: drop-shadow(0 0 20px rgba(0,200,255,0.8)); }
        @keyframes zeroPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .title { font-size: 22px; font-weight: bold; text-align: center; background: linear-gradient(45deg, #00d4ff, #ff6b35, #ffd93d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 8px 0; }
        .subtitle { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 10px; }
        
        .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.15); }
        
        .score-panel { display: flex; justify-content: space-around; margin: 10px 0; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid rgba(0,200,255,0.3); }
        .score-item { text-align: center; }
        .score-value { font-size: 22px; font-weight: bold; color: #ffd93d; }
        .score-label { font-size: 11px; color: #aaa; }
        
        .stage-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .stage-btn { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; background: rgba(255,255,255,0.05); color: white; font-size: 24px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s; }        .stage-btn.unlocked { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); color: #ccc; }        .stage-btn.current { border-color: #00d4ff; background: linear-gradient(135deg, rgba(0,200,255,0.4), rgba(0,150,255,0.2)); color: #00d4ff; animation: pulse 1.5s infinite; transform: scale(1.05); }        .stage-btn.locked { opacity: 0.4; }        .stage-btn.completed { border-color: #27ae60; background: rgba(39,174,96,0.2); }        .stage-btn:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.6); }        .stage-btn.current:hover { transform: scale(1.15); }        .stage-num { font-size: 11px; margin-top: 2px; }        @keyframes pulse { 0%, 100% { transform: scale(1.05); box-shadow: 0 0 0 0 rgba(0,212,255,0.4); } 50% { transform: scale(1.1); box-shadow: 0 0 20px 5px rgba(0,212,255,0.6); } }
        
        .game-btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; }
        .game-btn:active { transform: scale(0.95); }
        .btn-battle { background: linear-gradient(135deg, #ff6b35, #ff3366); }
        .btn-free { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .btn-speak { background: linear-gradient(135deg, #3498db, #2980b9); }
        
        .victory-container { text-align: center; padding: 20px; }
        .victory-title { font-size: 32px; font-weight: bold; color: #ffd93d; margin: 15px 0; animation: pulse 1s ease-in-out infinite; }
        .victory-subtitle { font-size: 18px; color: #00d4ff; margin-bottom: 20px; }
        .victory-stats { display: flex; justify-content: space-around; margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; }
        .victory-stat { text-align: center; }
        .victory-stat-value { font-size: 28px; font-weight: bold; color: #ffd93d; }
        .victory-stat-label { font-size: 12px; color: #aaa; margin-top: 5px; }
        .victory-level-up { background: linear-gradient(135deg, #f39c12, #e74c3c); padding: 15px; border-radius: 15px; margin: 15px 0; animation: bounce 0.5s ease-in-out infinite; }
        .level-up-text { font-size: 22px; font-weight: bold; color: #fff; }
        .level-up-info { font-size: 16px; color: #fff; margin-top: 5px; }
        .victory-stars { font-size: 40px; margin: 15px 0; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .battle-arena { text-align: center; padding: 10px; }
        .vs-text { font-size: 20px; font-weight: bold; color: #ff3366; }
        .fighter { font-size: 55px; display: inline-block; }
        .hp-container { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .hp-section { text-align: center; flex: 1; }
        .hp-name { font-size: 13px; color: #00d4ff; margin-bottom: 3px; }
        .hp-name.monster { color: #ff6b6b; }
        .hp-bar-fight { height: 14px; background: #222; border-radius: 7px; overflow: hidden; margin: 3px 8px; }
        .hp-fill-zero { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff88); transition: width 0.5s; }
        .hp-fill-monster { height: 100%; background: linear-gradient(90deg, #ff3366, #ff6b6b); transition: width 0.5s; }
        
        .monster-info { text-align: center; padding: 8px; background: rgba(255,0,0,0.1); border-radius: 10px; margin: 8px 0; border: 1px solid rgba(255,0,0,0.3); }
        .monster-name { font-size: 15px; color: #ff6b6b; font-weight: bold; }
        .monster-desc { font-size: 11px; color: #aaa; margin-top: 3px; }
        
        .question-type { display: inline-block; padding: 4px 12px; background: linear-gradient(135deg, #9b59b6, #8e44ad); border-radius: 15px; font-size: 12px; margin: 5px 0; }
        .question-type.match { background: linear-gradient(135deg, #00d4ff, #0099ff); }
        .question-type.hearing { background: linear-gradient(135deg, #f39c12, #e74c3c); }
        .question-type.puzzle { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .question-type.speak { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .question-type.dialogue { background: linear-gradient(135deg, #ff6b35, #f39c12); }
        
        .word-display { text-align: center; font-size: 28px; font-weight: bold; color: #00d4ff; margin: 12px 0; }
        .meaning-display { text-align: center; color: #ffd93d; font-size: 18px; margin: 8px 0; }
        
        .voice-btn-container { text-align: center; margin: 8px 0; }
        .voice-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 20px; background: linear-gradient(135deg, #00d4ff, #00ff88); border: none; border-radius: 20px; color: #0a0a1a; font-size: 14px; font-weight: bold; cursor: pointer; }
        .voice-btn.playing { background: linear-gradient(135deg, #ffd93d, #ff6b35); animation: vPulse 0.5s infinite; }
        @keyframes vPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .speak-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 25px; background: linear-gradient(135deg, #f39c12, #e74c3c); border: none; border-radius: 25px; color: white; font-size: 15px; font-weight: bold; cursor: pointer; margin: 10px; }
        .speak-btn.recording { background: linear-gradient(135deg, #e74c3c, #c0392b); animation: recPulse 0.8s infinite; }
        @keyframes recPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.7); } 50% { box-shadow: 0 0 0 12px rgba(231,76,60,0); } }
        
        .option-btn { display: block; width: 100%; padding: 12px; margin: 5px 0; border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; font-size: 15px; background: rgba(255,255,255,0.08); color: white; cursor: pointer; }
        .option-btn.correct { background: rgba(39, 174, 96, 0.5); border-color: #27ae60; }
        .option-btn.wrong { background: rgba(231, 76, 60, 0.5); border-color: #e74c3c; }
        
        .progress { text-align: center; color: #aaa; margin: 6px 0; font-size: 12px; }
        
        .result { text-align: center; padding: 15px 0; }
        .result-title { font-size: 24px; margin: 10px 0; }
        .result-score { font-size: 45px; font-weight: bold; color: #ffd93d; }
        .result-stars { font-size: 26px; margin: 10px 0; }
        
        .hidden { display: none !important; }
        
        .attack-effect { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; animation: attAnim 0.5s forwards; z-index: 100; pointer-events: none; }
        @keyframes attAnim { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } }
        
        .letters-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 10px 0; }
        .letter-btn { width: 40px; height: 40px; border: 2px solid #00d4ff; border-radius: 8px; background: rgba(0,200,255,0.1); color: #00d4ff; font-size: 18px; font-weight: bold; cursor: pointer; }
        .letter-btn.used { background: #00d4ff; color: #0a0a1a; }
        
        .input-display { text-align: center; font-size: 24px; color: #00d4ff; margin: 10px 0; min-height: 30px; letter-spacing: 4px; }
        
        .wrong-book-btn { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .wrong-book-panel { max-height: 300px; overflow-y: auto; margin: 10px 0; }
        .wrong-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin: 5px 0; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .wrong-item-word { font-size: 16px; color: #00d4ff; font-weight: bold; }
        .wrong-item-meaning { font-size: 14px; color: #ffd93d; }
        .wrong-item-count { font-size: 12px; color: #ff6b6b; background: rgba(231,76,60,0.2); padding: 2px 8px; border-radius: 10px; }
        .wrong-item-actions { display: flex; gap: 5px; }
        .wrong-item-btn { padding: 5px 10px; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; }
        .wrong-item-btn.listen { background: #00d4ff; color: #0a0a1a; }
        .wrong-item-btn.remove { background: #e74c3c; color: white; }
        .empty-hint { text-align: center; color: #aaa; padding: 20px; }
        .sound-toggle { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; margin: 10px 0; }
        .sound-toggle label { color: #aaa; font-size: 14px; }
        .sound-toggle input { width: 20px; height: 20px; cursor: pointer; }
        .stats-panel { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 10px 0; }
        .stat-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 20px; font-weight: bold; color: #ffd93d; }
        .stat-label { font-size: 11px; color: #aaa; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 1000; animation: toastIn 0.3s ease; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <!-- 主菜单 -->
        <div id="menu" class="card">
            <div class="zero-header">
                <div class="zero-icon">🦸</div>
                <div class="title">⚔️ 赛罗奥特曼英语大作战 ⚔️</div>
                <div class="subtitle">打败10个怪兽，守护地球！</div>
            </div>
            <div class="score-panel">
                <div class="score-item"><div class="score-value" id="totalScore">0</div><div class="score-label">⚡能量</div></div>
                <div class="score-item"><div class="score-value" id="levelDisplay">Lv.1</div><div class="score-label">🏅等级</div></div>
                <div class="score-item"><div class="score-value" id="totalStars">0</div><div class="score-label">⭐星星</div></div>
            </div>
            <div class="progress" style="display:flex;justify-content:center;gap:10px;margin-bottom:10px;">
                <button class="level-btn" id="level1Btn" onclick="switchLevel(1)" style="padding:8px 20px;border-radius:10px;border:2px solid #00d4ff;background:rgba(0,212,255,0.2);color:#00d4ff;cursor:pointer;">📘 Level 1</button>
                <button class="level-btn" id="level2Btn" onclick="switchLevel(2)" style="padding:8px 20px;border-radius:10px;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.05);color:#aaa;cursor:pointer;">📗 Level 2</button>
                <button class="level-btn" id="level3Btn" onclick="switchLevel(3)" style="padding:8px 20px;border-radius:10px;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.05);color:#aaa;cursor:pointer;">📕 Level 3</button>
            </div>
            <div class="progress">选择单元（可多选）</div>
            <div class="stage-grid" id="homeUnitSelector" style="grid-template-columns: repeat(6, 1fr);"></div>
            
            <!-- 学习建议区域 -->
            <div id="studyAdvice" style="background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:10px;padding:15px;margin:10px 0;">
                <div style="color:#ffd93d;font-size:16px;font-weight:bold;margin-bottom:8px;">💡 学习建议</div>
                <div id="adviceContent" style="color:#aaa;font-size:14px;line-height:1.6;">正在分析你的学习情况...</div>
            </div>
            
            <button class="game-btn btn-battle" onclick="confirmUnitsAndBattle()">⚔️ 开始战斗</button>
            <button class="game-btn" style="background:linear-gradient(135deg, #9b59b6, #8e44ad);" onclick="showMonsterCollection()">👾 怪兽图鉴</button>
            <button class="game-btn" style="background:linear-gradient(135deg, #f39c12, #e67e22);" onclick="showAchievements()">🏆 成就</button>
            <button class="game-btn" style="background:linear-gradient(135deg, #00b894, #00cec9);" onclick="showStudyReport()">📊 学习报告</button>
            <button class="game-btn" style="background:linear-gradient(135deg, #e74c3c, #c0392b);" onclick="showWrongBook()">📖 错题本</button>
            <div class="speed-control" style="text-align:center;margin:10px 0;">
                <span style="color:#aaa;font-size:14px;">语速：</span>
                <button class="speed-btn" id="speedSlowBtn" onclick="setSpeechRate('slow')" style="padding:5px 10px;border-radius:5px;border:1px solid #555;background:rgba(255,255,255,0.05);color:#aaa;cursor:pointer;margin:0 3px;">🐢 慢速</button>
                <button class="speed-btn" id="speedNormalBtn" onclick="setSpeechRate('normal')" style="padding:5px 10px;border-radius:5px;border:2px solid #00d4ff;background:rgba(0,212,255,0.2);color:#00d4ff;cursor:pointer;margin:0 3px;">🚶 正常</button>
                <button class="speed-btn" id="speedFastBtn" onclick="setSpeechRate('fast')" style="padding:5px 10px;border-radius:5px;border:1px solid #555;background:rgba(255,255,255,0.05);color:#aaa;cursor:pointer;margin:0 3px;">🏃 快速</button>
            </div>
        </div>
        
        <!-- 错题本界面 -->
        <div id="wrongBook" class="card hidden">
            <div class="title">📖 错题本</div>
            <div class="subtitle">记录你答错的单词，针对性复习</div>
            <div class="stats-panel">
                <div class="stat-item"><div class="stat-value" id="wrongTotalCount">0</div><div class="stat-label">错题总数</div></div>
                <div class="stat-item"><div class="stat-value" id="wrongReviewCount">0</div><div class="stat-label">已复习次数</div></div>
            </div>
            <div class="wrong-book-panel" id="wrongBookList"></div>
            <button class="game-btn btn-battle" onclick="startWrongBookReview()" id="reviewBtn">🔄 开始复习错题</button>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <!-- 战斗界面 -->
        <div id="battleGame" class="card hidden">
            <div class="title">⚔️ 第 <span id="stageNum">1</span> 关</div>
            <div class="battle-arena">
                <div class="hp-container">
                    <div class="hp-section"><div class="hp-name">赛罗</div><div class="hp-bar-fight"><div class="hp-fill-zero" id="zeroHp" style="width:100%"></div></div></div>
                    <div class="vs-text">VS</div>
                    <div class="hp-section"><div class="hp-name monster" id="monsterHpName">怪兽</div><div class="hp-bar-fight"><div class="hp-fill-monster" id="monsterHp" style="width:100%"></div></div></div>
                </div>
                <div><span class="fighter">🦸</span><span class="vs-text" style="font-size:16px;margin:0 10px;">⚔️</span><span class="fighter" id="monsterEmoji">👾</span></div>
            </div>
            <div class="monster-info"><div class="monster-name" id="monsterName">小怪兽</div><div class="monster-desc" id="monsterDesc">打败它！</div></div>
            <div class="progress" id="battleProgress">第 1/5 题</div>
            <div id="questionArea"></div>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <!-- 口语界面 -->
        <div id="speakingGame" class="card hidden">
            <div class="title">🎤 口语练习</div>
            <div class="progress" id="speakingProgress">第 1/10 题</div>
            <div class="word-display" id="speakWord">HELLO</div>
            <div class="meaning-display" id="speakMeaning">你好</div>
            <div class="voice-btn-container"><button class="voice-btn" id="speakListenBtn" onclick="speakCurrentWord()"><span>🔊</span><span>听示范</span></button></div>
            <div style="text-align:center;margin:15px 0;">
                <button class="speak-btn" id="recBtn" onclick="toggleRecord()">
                    <span>🎙️</span><span id="recText">点击录音</span>
                </button>
            </div>
            <div id="speakResult" style="text-align:center;padding:10px;background:rgba(0,0,0,0.3);border-radius:10px;margin:8px 0;">
                <div style="color:#aaa;">按住按钮说英文</div>
            </div>
            <button class="game-btn" id="nextSpeakBtn" onclick="nextSpeakQuestion()" style="background:#27ae60;display:none;margin-top:10px;">下一题 ➡️</button>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <!-- 胜利界面 -->
        <div id="victory" class="card hidden">
            <div class="victory-container">
                <div class="victory-title" id="victoryTitle">🎊 通关成功！🎊</div>
                <div class="victory-subtitle" id="victorySubtitle">恭喜你打败了所有怪兽！</div>
                <div class="victory-stats">
                    <div class="victory-stat">
                        <div class="victory-stat-value" id="victoryCorrect">0</div>
                        <div class="victory-stat-label">答对题目</div>
                    </div>
                    <div class="victory-stat">
                        <div class="victory-stat-value" id="victoryEnergy">+0</div>
                        <div class="victory-stat-label">获得能量</div>
                    </div>
                    <div class="victory-stat">
                        <div class="victory-stat-value" id="victoryStar">+0</div>
                        <div class="victory-stat-label">获得星星</div>
                    </div>
                </div>
                <div class="victory-level-up" id="levelUpNotice" style="display:none;">
                    <div class="level-up-text">🌟🎉 升级了！🎉🌟</div>
                    <div class="level-up-info" id="levelUpInfo">现在是 Lv.2</div>
                </div>
                <div class="victory-stars" id="victoryStars"></div>
                <button class="game-btn btn-battle" onclick="backToMenu()">🏠 返回主页</button>
            </div>
        </div>
        
        <!-- 结果 -->
        <div id="result" class="card hidden">
            <div class="result">
                <div style="font-size:55px;" id="resultEmoji">🏆</div>
                <div class="result-title" id="resultTitle">太棒了！</div>
                <div class="result-score" id="resultScore">+100</div>
                <div class="progress" id="resultMsg">正确：5/5</div>
                <div class="result-stars" id="resultStars"></div>
                <button class="game-btn btn-battle" onclick="backToMenu()">🚀 继续战斗</button>
                <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
            </div>
        </div>
    </div>

<script>
// 情景对话题库 - PET口语Part1/Part3核心题型
const DIALOGUE_SCENES = [
    // 问候与介绍
    {scene:"打招呼",question:"Hello! How are you?",options:["I'm fine, thanks!","Goodbye!","What's your name?"],correct:0},
    {scene:"打招呼",question:"Nice to meet you!",options:["Nice to meet you too!","I'm seven.","Good morning!"],correct:0},
    {scene:"自我介绍",question:"What's your name?",options:["I'm a student.","My name is Tom.","I'm fine."],correct:1},
    {scene:"自我介绍",question:"How old are you?",options:["I'm eight years old.","My name is Amy.","I have a dog."],correct:0},

// 从已解锁怪兽中随机选择10个作为本次闯关的怪兽
function selectBattleMonsters(){
    let unlockedMonsters = ALL_MONSTERS.filter(function(m){return unlockedMonsterIds.includes(m.id);});
    
    // 打乱顺序
    unlockedMonsters = shuffle(unlockedMonsters);
    
    // 选择前10个（如果不足10个则全部使用）
    battleMonsters = unlockedMonsters.slice(0, Math.min(10, unlockedMonsters.length));
    
    return battleMonsters;
}

// 解锁新怪兽（支持解锁多个）
function unlockNewMonster(count){
    count = count || 1; // 默认解锁1个
    let unlocked = [];
    
    for(let i = 0; i < count; i++){
        // 找出未解锁的怪兽
        let lockedMonsters = ALL_MONSTERS.filter(function(m){return !unlockedMonsterIds.includes(m.id);});
        
        if(lockedMonsters.length > 0){
            // 随机选择一个解锁
            let newMonster = lockedMonsters[Math.floor(Math.random() * lockedMonsters.length)];
            unlockedMonsterIds.push(newMonster.id);
            unlocked.push(newMonster);
        }
    }
    
    if(unlocked.length > 0){
        // 显示解锁提示
        let names = unlocked.map(function(m){return m.emoji + ' ' + m.name;}).join('、');
        showToast('🎉 解锁新怪兽：' + names + '！');
        saveProgress();
        checkAchievements();
    }
    
    return unlocked;
}

// 根据表现计算应解锁的怪兽数量
function calculateUnlockCount(){
    let baseCount = 2; // 基础解锁2个
    
    // 根据答对数量额外解锁
    let correctCount = battleScore / ENERGY_PER_CORRECT;
    if(correctCount >= 50){
        baseCount += 3; // 答对50题以上，额外解锁3个
    }else if(correctCount >= 40){
        baseCount += 2; // 答对40题以上，额外解锁2个
    }else if(correctCount >= 30){
        baseCount += 1; // 答对30题以上，额外解锁1个
    }
    
    return baseCount;
}

function initAudioContext(){
    try{
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }catch(e){
        console.warn('Web Audio API 不支持');
    }
}

function playSound(type){
    if(!soundEnabled || !audioContext) return;
    
    try{
        let oscillator = audioContext.createOscillator();
        let gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        if(type === 'correct'){
            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1);
            oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialDecayTo = 0.01;
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }else if(type === 'wrong'){
            oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(150, audioContext.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }else if(type === 'victory'){
            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.15);
            oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.3);
            oscillator.frequency.setValueAtTime(1046.50, audioContext.currentTime + 0.45);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.6);
        }else if(type === 'click'){
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.05);
        }
    }catch(e){
        console.warn('播放音效失败:', e);
    }
}

function getWordMeaning(word){
    word = word.toLowerCase();
    let meaning = '';
    [1,2,3].forEach(function(lvl){
        Object.keys(LEVEL_DATA[lvl]).forEach(function(u){
            LEVEL_DATA[lvl][u].words.forEach(function(w){
                if(w[0].toLowerCase() === word){
                    meaning = w[1];
                }
            });
        });
    });
    return meaning;
}

function addToWrongBook(word, meaning){
    if(!word || !meaning){
        console.warn('addToWrongBook: 无效的数据', word, meaning);
        return;
    }
    let found = wrongBook.find(function(item){ return item.word === word; });
    if(found){
        found.count++;
        found.lastWrong = new Date().toISOString();
    }else{
        wrongBook.push({
            word: word,
            meaning: meaning,
            count: 1,
            firstWrong: new Date().toISOString(),
            lastWrong: new Date().toISOString()
        });
    }
    saveProgress();
}

function removeFromWrongBook(word){
    wrongBook = wrongBook.filter(function(item){ return item.word !== word; });

function toggleHomeUnit(i, btn){
    let currentLevelUnlocked = unlockedUnits[currentLevel] || [1];
    // 检查单元是否已解锁
    if(!currentLevelUnlocked.includes(i)){
        showToast('请先完成单元 '+(i-1)+' 解锁此单元');
        return;
    }
    
    if(battleUnits.includes(i)){
        if(battleUnits.length>1){
            battleUnits=battleUnits.filter(function(u){return u!==i;});
            btn.classList.remove('current');
        }
    }else{
        battleUnits.push(i);
        btn.classList.add('current');
    }
}

// 生成个性化学习建议
function updateStudyAdvice(){
    let advice = [];
    
    // 基于错题本生成建议
    if(wrongBook.length > 0){
        let totalWrong = wrongBook.reduce(function(sum, item){ return sum + item.count; }, 0);
        let avgWrong = totalWrong / wrongBook.length;
        
        if(avgWrong >= 3){
            advice.push('📌 你的错题重复率较高，建议重点复习错题本中的内容');
        }
        
        if(wrongBook.length > 10){
            advice.push('📚 错题较多，建议每天复习5-10个错题');
        }
        
        // 找出错误最多的单词
        let topWrong = wrongBook.sort(function(a, b){ return b.count - a.count; })[0];
        if(topWrong && topWrong.count >= 2){
            advice.push('⚠️ 重点攻克："' + topWrong.word + '" 已错' + topWrong.count + '次');
        }
    }else{
        advice.push('✨ 太棒了！暂无错题，继续保持！');
    }
    
    // 基于解锁进度生成建议
    let currentLevelUnlocked = unlockedUnits[currentLevel] || [1];
    if(currentLevelUnlocked.length < 12){
        let nextUnit = currentLevelUnlocked.length + 1;
        advice.push('🎯 下一步：解锁 Level ' + currentLevel + ' 单元 ' + nextUnit);
    }else{
        advice.push('🏆 Level ' + currentLevel + ' 已解锁所有单元！');
    }
    
    // 基于等级生成建议
    if(level < 5){
        advice.push('💪 继续努力，提升到 Lv.5 解锁更多内容');
    }
    
    // 显示建议
    let adviceHtml = advice.map(function(a){ return '<div style="margin:5px 0;">' + a + '</div>'; }).join('');
    document.getElementById('adviceContent').innerHTML = adviceHtml;
}

// 更新每日学习统计
function updateDailyStats(){
    let today = new Date().toISOString().split('T')[0];
    
    // 记录学习日期
    if(!studyStats.studyDays.includes(today)){
        studyStats.studyDays.push(today);
    }
    
    // 更新每日统计
    if(!studyStats.dailyStats[today]){
        studyStats.dailyStats[today] = {
            battles: 0,
            questions: 0,
            correct: 0,
            speakAttempts: 0
        };
    }
    
    saveProgress();
}

// 记录答题统计
function recordQuestionStats(type, isCorrect){
    studyStats.totalQuestions++;
    if(isCorrect) studyStats.correctAnswers++;
    
    // 根据题型记录
    if(type === 'hearing'){
        studyStats.listeningTotal++;
        if(isCorrect) studyStats.listeningCorrect++;
    }
    if(type === 'dialogueScene' || type === 'dialogue'){
        studyStats.dialogueTotal++;
        if(isCorrect) studyStats.dialogueCorrect++;
    }
    if(type === 'dictation'){
        studyStats.dictationTotal++;
        if(isCorrect) studyStats.dictationCorrect++;
    }
    if(type === 'speak' || type === 'speakImage'){
        studyStats.totalSpeakAttempts++;
        if(isCorrect) studyStats.speakCorrectCount++;
    }
    
    // 更新每日统计
    let today = new Date().toISOString().split('T')[0];
    if(!studyStats.dailyStats[today]){
        studyStats.dailyStats[today] = {battles: 0, questions: 0, correct: 0, speakAttempts: 0};
    }
    studyStats.dailyStats[today].questions++;
    if(isCorrect) studyStats.dailyStats[today].correct++;
    
    saveProgress();
}

// ========== 自由练习模式 ==========
function startFreeMode(){
    startBattle();
}

function startFreeBattle(){
    startBattle();
}

function startBattle(){
    if(audioContext && audioContext.state === 'suspended'){
        audioContext.resume();
    }
    playSound('click');
    
    isWrongBookReview = false;
    qIdx=0;correctCount=0;mHp=100;zHp=100;
    battleScore=0;
    battleQuestionPool=[];
    usedQuestions=[];
    currentMonsterIndex=0;
    
    // 选择本次闯关的怪兽
    selectBattleMonsters();
    
    // 生成题目池
    battleUnits.forEach(function(u){
        ALL_WORDS[u].words.forEach(function(w){
            battleQuestionPool.push({type:'word', eng:w[0], chn:w[1]});
        });
        ALL_WORDS[u].sentences.forEach(function(s){
            battleQuestionPool.push({type:'sentence', eng:s[0], chn:s[1]});
        });
    });
    battleQuestionPool=shuffle(battleQuestionPool);
    
    startRound(1);
}

function startRound(round){
    qIdx=0;correctCount=0;mHp=100;zHp=100;
    currentMonster=battleMonsters[round-1];
    
    document.getElementById('stageNum').textContent=round;
    document.getElementById('monsterEmoji').textContent=currentMonster.emoji;
    document.getElementById('monsterName').textContent=currentMonster.name;
    document.getElementById('monsterDesc').textContent=currentMonster.desc;
    document.getElementById('monsterHpName').textContent=currentMonster.name;
    
    currentMonsterIndex=round;
    updateHP();
    showRoundQuestion();
    show('battleGame');
}

function getDifficulty(round){
    let difficulty = {
        questionCount: 5,
        types: ['hearing','choice','dialogue','dialogueScene','speak','speakImage']
    };
    
    // 优化难度曲线，突出听说能力（PET考试导向）
    // 听力挑战(hearing): 听单词/句子选中文 - PET听力Part1
    // 口语跟读(speak): 跟读单词/句子 - PET口语预备
    // 看图说话(speakImage): 看图说英文 - PET口语Part2
    // 情景对话(dialogue): 听问题选回答 - PET口语Part1
    // 情景对话场景(dialogueScene): 真实场景对话 - PET口语Part1/Part3
    // 单词选择(choice): 看英文选中文 - 词汇认知
    
    if(round===1){
        difficulty.questionCount=3;
        difficulty.types=['hearing','choice']; // 听力挑战+单词选择
    }else if(round===2){
        difficulty.questionCount=3;
        difficulty.types=['hearing','choice','speak']; // 增加口语跟读
    }else if(round===3){
        difficulty.questionCount=4;
        difficulty.types=['hearing','choice','speak','dialogueScene']; // 增加情景对话场景
    }else if(round===4){
        difficulty.questionCount=4;
        difficulty.types=['hearing','speak','dialogueScene']; // 听力挑战
    }else if(round===5){
        difficulty.questionCount=5;
        difficulty.types=['hearing','speak','dialogueScene','speakImage']; // 看图说话
    }else if(round===6){
        difficulty.questionCount=5;
        difficulty.types=['hearing','speak','dialogueScene','speakImage'];
    }else if(round===7){
        difficulty.questionCount=5;
        difficulty.types=['hearing','speak','dialogueScene','speakImage'];
    }else if(round===8){
        difficulty.questionCount=6;
        difficulty.types=['hearing','speak','dialogueScene','speakImage','dictation'];
    }else if(round===9){
        difficulty.questionCount=6;
        difficulty.types=['hearing','speak','dialogueScene','speakImage','dictation'];
    }else{
        difficulty.questionCount=7;
        difficulty.types=['hearing','speak','dialogueScene','speakImage','dictation'];
    }
    
    return difficulty;
}

function updateHP(){
    document.getElementById('monsterHp').style.width=Math.max(0,mHp)+'%';
    document.getElementById('zeroHp').style.width=Math.max(0,zHp)+'%';
}

function showRoundQuestion(){
    // 怪兽血量清零 → 过关
    if(mHp<=0){
        nextRound();
        return;
    }
    
    // 赛罗血量清零 → 失败
    if(zHp<=0){
        endBattle();
        return;
    }
    
    let difficulty = getDifficulty(currentMonsterIndex);
    
    // 题目池空了
    if(battleQuestionPool.length===0){
        // 错题本复习模式：结束战斗
        if(isWrongBookReview){
            endBattle();
            return;
        }
        // 正常模式：重新生成题目
        if(battleUnits.length === 0){
            // 如果没有选择单元，使用默认单元
            battleUnits = [currentLevel];
        }
        battleUnits.forEach(function(u){
            if(ALL_WORDS[u]){
                ALL_WORDS[u].words.forEach(function(w){
                    battleQuestionPool.push({type:'word', eng:w[0], chn:w[1]});
                });
                ALL_WORDS[u].sentences.forEach(function(s){
                    battleQuestionPool.push({type:'sentence', eng:s[0], chn:s[1]});
                });
            }
        });
        if(battleQuestionPool.length === 0){
            // 如果还是没有题目，结束战斗
            endBattle();
            return;
        }
        battleQuestionPool=shuffle(battleQuestionPool);
        usedQuestions=[]; // 清空记录，允许重复
    }
    
    // 选择题型（避免与上次同一单词同一题型）
    let type='';
    
    // 错题本复习模式：只使用适合单词的题型
    if(isWrongBookReview){
        let wrongBookTypes = ['hearing', 'choice', 'speak'];
        type = wrongBookTypes[Math.floor(Math.random() * wrongBookTypes.length)];
    }else{
        type = difficulty.types[Math.floor(Math.random()*difficulty.types.length)];
    }
    currentQuestionType = type; // 记录当前题型
    
    // 选一个题目（优先选最近没用过的单词）
    let item=null;
    let itemIndex=-1;
    
    for(let i=0;i<battleQuestionPool.length;i++){
        let candidate=battleQuestionPool[i];
        let key=candidate.eng+'_'+type;
        if(!usedQuestions.includes(key)){
            item=candidate;
            itemIndex=i;
            break;
        }
    }
    
    // 如果所有题都用过了，随机选一个
    if(!item){
        itemIndex=Math.floor(Math.random()*battleQuestionPool.length);
        item=battleQuestionPool[itemIndex];
    }
    
    // 听力题现在支持单词和句子，不需要特殊处理
    
    // 对话题只用句子
    if(type==='dialogue' && item.type!=='sentence'){
        // 找一个句子
        let sentenceIndex=battleQuestionPool.findIndex(function(i){return i.type==='sentence';});
        if(sentenceIndex>=0){
            item=battleQuestionPool[sentenceIndex];
            itemIndex=sentenceIndex;
        }else{
            type='hearing'; // 改为听力题
        }
    }
    
    // 看图说话只用单词
    if(type==='speakImage' && item.type!=='word'){
        // 找一个单词
        let wordIndex=battleQuestionPool.findIndex(function(i){return i.type==='word';});
        if(wordIndex>=0){
            item=battleQuestionPool[wordIndex];
            itemIndex=wordIndex;
        }else{
            type='speak';
        }
    }
    
    // 听写填空只用句子
    if(type==='dictation' && item.type!=='sentence'){
        // 找一个句子
        let sentenceIndex=battleQuestionPool.findIndex(function(i){return i.type==='sentence';});
        if(sentenceIndex>=0){
            item=battleQuestionPool[sentenceIndex];
            itemIndex=sentenceIndex;
        }else{
            type='hearing'; // 改为听力题
        }
    }
    
    // 记录已用
    usedQuestions.push(item.eng+'_'+type);
    battleQuestionPool.splice(itemIndex,1);
    
    // 进度显示
    if(isWrongBookReview){
        document.getElementById('battleProgress').textContent='错题复习 · 第 '+(wrongBookTotal - battleQuestionPool.length)+'/'+wrongBookTotal+' 题';
    }else{
        document.getElementById('battleProgress').textContent='第 '+currentMonsterIndex+'/10 关 · 已答 '+qIdx+' 题';
    }
    
    let area = document.getElementById('questionArea');
    
    if(type==='choice'){
        showChoiceQuestion(area, item, battleQuestionPool.slice(0,10));
    }else if(type==='match'){
        showMatchQuestion(area, item, battleQuestionPool.slice(0,10));
    }else if(type==='hearing'){
        showHearingQuestion(area, item, battleQuestionPool.slice(0,10));
    }else if(type==='puzzle'){
        showPuzzleQuestion(area, item);
    }else if(type==='dialogue'){
        showDialogueQuestion(area, item, battleQuestionPool.slice(0,10));
    }else if(type==='speak'){
        showSpeakQuestion(area, item);
    }else if(type==='speakImage'){
        showSpeakImageQuestion(area, item);
    }else if(type==='dialogueScene'){
        showDialogueSceneQuestion(area);
    }else if(type==='dictation'){
        showDictationQuestion(area, item);
    }
}

function nextRound(){
    // 错题本复习模式：检查是否还有错题
    if(isWrongBookReview){
        if(battleQuestionPool.length === 0){
            endAllBattles();
            return;
        }
        // 继续下一题
        let area=document.getElementById('questionArea');
        area.innerHTML='<div style="text-align:center;padding:30px;"><div style="font-size:50px;">✅</div><div style="color:#00ff88;font-size:20px;margin:10px 0;">答对了！</div><div style="color:#aaa;">继续下一题...</div></div>';
        setTimeout(function(){
            showRoundQuestion();
        },1000);
        return;
    }
    
    if(currentMonsterIndex>=10){
        endAllBattles();
        return;
    }
    // 显示过关动画后进入下一关
    let area=document.getElementById('questionArea');
    area.innerHTML='<div style="text-align:center;padding:30px;"><div style="font-size:50px;">🎉</div><div style="color:#ffd93d;font-size:20px;margin:10px 0;">打败了 '+currentMonster.name+'！</div><div style="color:#aaa;">准备下一关...</div></div>';
    setTimeout(function(){
        startRound(currentMonsterIndex+1);
    },1500);
}

// 选择题
function showChoiceQuestion(area, word, pool){
    currentText=word.eng;
    let escapedEng = word.eng.replace(/'/g, "\\'");
    area.innerHTML='<div class="question-type">单词选择</div>'+
        '<div class="word-display">'+word.eng+'</div>'+
        '<div class="voice-btn-container"><button class="voice-btn" id="choiceVoiceBtn" onclick="speakWord(\''+escapedEng+'\',\'choiceVoiceBtn\')"><span>🔊</span><span>听发音</span></button></div>'+
        '<div id="options"></div>';
    
    // 从题目池中找其他单词作为干扰项
    let wrongItems = pool.filter(function(item){return item.eng!==word.eng;}).slice(0,3);
    if(wrongItems.length<3){
        // 错题本复习模式从所有级别所有单元补充
        if(isWrongBookReview){
            [1,2,3].forEach(function(lvl){
                Object.keys(LEVEL_DATA[lvl]).forEach(function(u){
                    LEVEL_DATA[lvl][u].words.forEach(function(w){
                        if(w[0]!==word.eng && wrongItems.length<3){
                            wrongItems.push({eng:w[0], chn:w[1]});
                        }
                    });
                });
            });
        }else{
            battleUnits.forEach(function(u){
                if(ALL_WORDS[u]){
                    ALL_WORDS[u].words.forEach(function(w){
                        if(w[0]!==word.eng && wrongItems.length<3){
                            wrongItems.push({eng:w[0], chn:w[1]});
                        }
                    });
                }
            });
        }
    }
    
    let opts=shuffle([word.chn].concat(wrongItems.map(function(item){return item.chn;})));
    let optArea=document.getElementById('options');
    
    opts.forEach(function(o){
        let b=document.createElement('button');
        b.className='option-btn';
        b.textContent=o;
        b.onclick=function(){checkAnswer(o===word.chn, this);};
        optArea.appendChild(b);
    });
}



// 配对题（看中文选英文）
function showMatchQuestion(area, word, pool){
    currentText=word.eng;
    area.innerHTML='<div class="question-type match">🎯 单词配对</div>'+
        '<div class="meaning-display" style="font-size:24px;margin:15px 0;">'+word.chn+'</div>'+
        '<div class="voice-btn-container"><button class="voice-btn" id="matchVoiceBtn" onclick="speakWord(\''+word.eng.replace(/'/g, "\\'")+'\',\'matchVoiceBtn\')"><span>🔊</span><span>听发音</span></button></div>'+
        '<div id="options"></div>';
    
    let wrongItems = pool.filter(function(item){return item.eng!==word.eng;}).slice(0,3);
    if(wrongItems.length<3){
        if(isWrongBookReview){
            [1,2,3].forEach(function(lvl){
                Object.keys(LEVEL_DATA[lvl]).forEach(function(u){
                    LEVEL_DATA[lvl][u].words.forEach(function(w){
                        if(w[0]!==word.eng && wrongItems.length<3){

// 战斗模式录音
function startBattleRecording(){
    console.log('startBattleRecording 被调用');
    
    if(!recognition){
        console.log('recognition 未初始化，尝试初始化...');
        preInitSpeechRecognition();
    }
    
    if(!recognition){
        console.error('recognition 初始化失败');
        document.getElementById('speakResultArea').innerHTML='<div style="color:#ff6b6b;">⚠️ 浏览器不支持语音识别</div>';
        return;
    }
    
    // 清除之前的超时
    if(recordingTimeout){
        clearTimeout(recordingTimeout);
        recordingTimeout = null;
    }
    
    // 先停止之前的识别（如果正在运行）
    isStoppingRecording = true;
    try{
        recognition.abort();
    }catch(stopErr){
        // 忽略停止错误
    }
    
    // 更新UI
    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('recText').textContent='点击停止';
    document.getElementById('speakResultArea').innerHTML='<div style="color:#ffd93d;">🎤 正在录音...</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请说英文单词</div>';
    
    // 设置超时检测
    recordingTimeout = setTimeout(function(){
        if(isRecording){
            console.warn('录音超时，自动停止');
            isRecording = false;
            isStoppingRecording = true;
            document.getElementById('recBtn').classList.remove('recording');
            document.getElementById('recText').textContent='点击录音';
            document.getElementById('speakResultArea').innerHTML='<div style="color:#ffd93d;">⚠️ 录音超时</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请重新尝试</div>';
            try{ recognition.abort(); }catch(e){}
            setTimeout(function(){isStoppingRecording=false;},200);
        }
    }, 15000);
    
    // 延迟后启动新识别（确保之前的识别完全停止）
    setTimeout(function(){
        // 在启动前再次设置停止标记，防止 onend 干扰
        isStoppingRecording = true;
        
        try{
            console.log('调用 recognition.start()...');
            recognition.start();
            console.log('recognition.start() 调用成功');
            
            // 启动成功后，重置标记
            isStoppingRecording = false;
            isRecording = true;
        }catch(startErr){
            console.error('启动录音失败:', startErr);
            clearTimeout(recordingTimeout);
            isRecording=false;
            isStoppingRecording=false;
            document.getElementById('recBtn').classList.remove('recording');
            document.getElementById('recText').textContent='点击录音';
            if(startErr.message && startErr.message.indexOf('already started') !== -1){
                document.getElementById('speakResultArea').innerHTML='<div style="color:#ffd93d;">⚠️ 录音已在运行</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请直接说话</div>';
            }else{
                document.getElementById('speakResultArea').innerHTML='<div style="color:#ff6b6b;">启动录音失败</div><div style="color:#aaa;font-size:12px;margin-top:5px;">'+escapeHtml(startErr.message || '未知错误')+'</div>';
            }
        }
    }, 500);
}

// ========== 口语练习（独立） ==========
let speakIdx=0, speakCorrect=0, speakData=[], speakUnit=1;
let speechRecognitionReady = false;

const NUMBER_WORDS = {
    'zero': '0', 'one': '1', 'two': '2', 'three': '3', 'four': '4',
    'five': '5', 'six': '6', 'seven': '7', 'eight': '8', 'nine': '9',
    'ten': '10', 'eleven': '11', 'twelve': '12', 'thirteen': '13',
    'fourteen': '14', 'fifteen': '15', 'sixteen': '16', 'seventeen': '17',
    'eighteen': '18', 'nineteen': '19', 'twenty': '20'
};

const WORD_NUMBERS = {
    '0': 'zero', '1': 'one', '2': 'two', '3': 'three', '4': 'four',
    '5': 'five', '6': 'six', '7': 'seven', '8': 'eight', '9': 'nine',
    '10': 'ten', '11': 'eleven', '12': 'twelve', '13': 'thirteen',
    '14': 'fourteen', '15': 'fifteen', '16': 'sixteen', '17': 'seventeen',
    '18': 'eighteen', '19': 'nineteen', '20': 'twenty'
};

function normalizeNumber(text){
    text = text.toLowerCase().trim();
    text = text.replace(/\.$/, '');
    text = text.replace(/\s+/g, '');
    // 英文数字转阿拉伯数字
    if(NUMBER_WORDS[text]){
        return NUMBER_WORDS[text];
    }
    // 阿拉伯数字保持不变
    if(WORD_NUMBERS[text]){
        return text;
    }
    return text;
}

function checkSpeechAnswer(spoken, correct){
    spoken = spoken.toLowerCase().trim();
    correct = correct.toLowerCase().trim();
    
    // 完全匹配
    if(spoken === correct){
        return true;
    }
    
    // 包含匹配
    if(spoken.includes(correct) || correct.includes(spoken)){
        return true;
    }
    
    // 数字标准化
    let spokenNorm = normalizeNumber(spoken);
    let correctNorm = normalizeNumber(correct);
    
    // 标准化后匹配
    if(spokenNorm === correctNorm){
        return true;
    }
    
    // 英文数字 -> 阿拉伯数字 映射检查
    // 情况1：正确答案是英文数字（如 "one"），语音识别返回阿拉伯数字（如 "1"）
    if(NUMBER_WORDS[correct] && spoken === NUMBER_WORDS[correct]){
        return true;
    }
    
    // 情况2：正确答案是阿拉伯数字（如 "1"），语音识别返回英文数字（如 "one"）
    if(WORD_NUMBERS[correct] && spoken === WORD_NUMBERS[correct]){
        return true;
    }
    
    // 情况3：语音识别返回英文数字（如 "one"），正确答案是阿拉伯数字（如 "1"）
    if(NUMBER_WORDS[spoken] && NUMBER_WORDS[spoken] === correct){
        return true;
    }
    
    // 情况4：语音识别返回阿拉伯数字（如 "1"），正确答案是英文数字（如 "one"）
    if(WORD_NUMBERS[spoken] && WORD_NUMBERS[spoken] === correct){
        return true;
    }
    
    // 单词级别的数字匹配
    let spokenWords = spoken.split(/\s+/);
    let correctWords = correct.split(/\s+/);
    
    for(let i = 0; i < spokenWords.length; i++){
        for(let j = 0; j < correctWords.length; j++){
            let sw = spokenWords[i];
            let cw = correctWords[j];
            
            // 检查单词是否是数字且匹配
            // 英文数字 vs 阿拉伯数字
            if(NUMBER_WORDS[sw] && NUMBER_WORDS[sw] === cw){
                return true;
            }
            if(NUMBER_WORDS[cw] && NUMBER_WORDS[cw] === sw){
                return true;
            }
            // 阿拉伯数字 vs 英文数字
            if(WORD_NUMBERS[sw] && WORD_NUMBERS[sw] === cw){
                return true;
            }
            if(WORD_NUMBERS[cw] && WORD_NUMBERS[cw] === sw){
                return true;
            }
        }
    }
    
    return false;
}

// 发音评分系统 - 计算发音相似度（0-100分）
function calculatePronunciationScore(spoken, correct){
    spoken = spoken.toLowerCase().trim();
    correct = correct.toLowerCase().trim();
    
    // 数字标准化处理 - 统一转换为英文数字进行评分
    if(WORD_NUMBERS[spoken]){
        spoken = WORD_NUMBERS[spoken];
    }
    if(WORD_NUMBERS[correct]){
        correct = WORD_NUMBERS[correct];
    }
    
    // 完全正确
    if(spoken === correct){
        return {score: 100, level: 'excellent', feedback: '发音完美！👍'};
    }
    
    // 计算编辑距离（Levenshtein距离）
    let matrix = [];
    for(let i = 0; i <= correct.length; i++){
        matrix[i] = [i];
    }
    for(let j = 0; j <= spoken.length; j++){
        matrix[0][j] = j;
    }
    for(let i = 1; i <= correct.length; i++){
        for(let j = 1; j <= spoken.length; j++){
            if(correct.charAt(i-1) === spoken.charAt(j-1)){
                matrix[i][j] = matrix[i-1][j-1];
            }else{
                matrix[i][j] = Math.min(
                    matrix[i-1][j-1] + 1,
                    matrix[i][j-1] + 1,
                    matrix[i-1][j] + 1
                );
            }
        }
    }
    
    let distance = matrix[correct.length][spoken.length];
    let maxLen = Math.max(correct.length, spoken.length);
    let similarity = Math.max(0, (1 - distance / maxLen) * 100);
    let score = Math.round(similarity);
    
    // 生成反馈
    let feedback = '';
    let level = '';
    if(score >= 90){
        level = 'excellent';
        feedback = '发音非常棒！🌟';
    }else if(score >= 75){
        level = 'good';
        feedback = '发音不错！继续加油！💪';
    }else if(score >= 60){
        level = 'fair';
        feedback = '发音还可以，再练习一下！📚';
    }else if(score >= 40){
        level = 'needs_work';
        feedback = '需要多练习这个单词哦~ 🎯';
    }else{
        level = 'try_again';
        feedback = '再试一次，你可以的！💪';
    }
    
    // 找出错误位置
    let errors = [];
    let i = 0, j = 0;
    while(i < correct.length && j < spoken.length){
        if(correct[i] !== spoken[j]){
            errors.push({
                position: i,
                expected: correct[i],
                got: spoken[j] || '(缺失)'
            });
        }
        i++;
        j++;
    }
    
    return {
        score: score,
        level: level,
        feedback: feedback,
        errors: errors.slice(0, 3), // 最多显示3个错误
        similarity: similarity.toFixed(1)
    };
}

// 显示发音评分结果
function showPronunciationResult(resultElement, score, feedback, isCorrect, spoken, correct){
    let scoreColor = score >= 90 ? '#00ff88' : score >= 75 ? '#00d4ff' : score >= 60 ? '#ffd93d' : '#ff6b6b';
    let scoreEmoji = score >= 90 ? '🌟' : score >= 75 ? '👍' : score >= 60 ? '💪' : '📚';
    
    let html = '<div style="text-align:center;">';
    
    if(isCorrect){
        html += '<div style="color:#27ae60;font-size:18px;">✅ 正确！</div>';
    }else{
        html += '<div style="color:#e74c3c;font-size:18px;">❌ 再试一次</div>';
    }
    
    html += '<div style="margin:10px 0;padding:10px;background:rgba(0,0,0,0.2);border-radius:10px;">'+
            '<div style="font-size:32px;color:'+scoreColor+';">'+scoreEmoji+' '+score+'分</div>'+
            '<div style="color:#aaa;font-size:12px;margin-top:5px;">发音准确度</div>'+
            '</div>'+
            '<div style="color:'+scoreColor+';font-size:14px;">'+feedback+'</div>';
    
    if(!isCorrect){
        html += '<div style="margin-top:10px;color:#aaa;font-size:12px;">'+
                '<div>你说：'+escapeHtml(spoken)+'</div>'+
                '<div>答案：'+escapeHtml(correct)+'</div>'+
                '</div>';
    }
    
    html += '</div>';
    resultElement.innerHTML = html;
}

function preInitSpeechRecognition(){
    let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(SpeechRecognition){
        try{
            recognition = new SpeechRecognition();
            recognition.lang='en-US';
            recognition.continuous=true; // 启用连续识别，防止过早结束
            recognition.interimResults=true; // 启用实时结果，提高响应速度
            recognition.maxAlternatives=3; // 获取多个候选结果，提高准确性
            
            // 移动设备特殊处理
            let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if(isMobile){
                // 移动设备设置较短的超时时间
                if('timeout' in recognition){
                    recognition.timeout = 8000;
                }
            }
            
            recognition.onresult=function(e){
                if(!isRecording) return;
                try{
                    // 获取实时识别结果
                    let interimTranscript = '';
                    let finalTranscript = '';
                    
                    for(let i = e.resultIndex; i < e.results.length; i++){
                        let transcript = e.results[i][0].transcript.toLowerCase().trim();
                        if(e.results[i].isFinal){
                            finalTranscript = transcript;
                        }else{
                            interimTranscript += transcript;
                        }
                    }
                    
                    // 判断当前是口语练习模式还是战斗模式
                    let isBattleMode = document.getElementById('speakResultArea') !== null;
                    let isSpeakImageMode = document.getElementById('speakImageResult') !== null;
                    let resultElement = isSpeakImageMode ? document.getElementById('speakImageResult') : (isBattleMode ? document.getElementById('speakResultArea') : document.getElementById('speakResult'));
                    
                    // 显示实时识别结果
                    if(interimTranscript && resultElement){
                        resultElement.innerHTML='<div style="color:#00d4ff;font-size:16px;">🎤 正在识别...</div><div style="color:#aaa;font-size:14px;">'+escapeHtml(interimTranscript)+'</div>';
                    }
                    
                    // 处理最终结果
                    if(finalTranscript){
                        let spoken = finalTranscript;
                        let correct=currentText.toLowerCase().trim();
                        
                        // 尝试所有候选结果
                        let isCorrect = false;
                        for(let i = 0; i < e.results[0].length && !isCorrect; i++){
                            let altSpoken = e.results[0][i].transcript.toLowerCase().trim();
                            isCorrect = checkSpeechAnswer(altSpoken, correct);
                            if(isCorrect) spoken = altSpoken;
                        }
                        
                        // 计算发音评分
                        let pronScore = calculatePronunciationScore(spoken, correct);
                        
                        // 清除超时
                        if(recordingTimeout){
                            clearTimeout(recordingTimeout);
                            recordingTimeout = null;
                        }
                        
                        // 重置录音状态
                        isRecording = false;
                        isStoppingRecording = true; // 标记为正常结束，防止 onend 重启
                        let recBtn = document.getElementById('recBtn') || document.getElementById('recBtnImage');
                        if(recBtn){
                            recBtn.classList.remove('recording');
                            let recText = document.getElementById('recText') || document.getElementById('recTextImage');
                            if(recText) recText.textContent='点击录音';
                        }
                        
                        // 延迟重置停止标记
                        setTimeout(function(){isStoppingRecording=false;},200);
                        
                        // 记录发音分数用于学习报告
                        studyStats.totalPronunciationScore += pronScore.score;
                        studyStats.pronunciationCount++;
                        
                        if(isCorrect){
                            if(isBattleMode || isSpeakImageMode){
                                // 战斗模式或看图说话模式
                                correctCount++;
                                battleScore+=ENERGY_PER_CORRECT;
                                let difficulty = getDifficulty(currentMonsterIndex);
                                let damage = Math.ceil(100 / difficulty.questionCount);
                                mHp -= damage;
                                showEff('💥');
                                playSound('correct');
                                showPronunciationResult(resultElement, pronScore.score, pronScore.feedback, true, spoken, correct);
                                updateHP();
                                setTimeout(function(){showRoundQuestion();},2000);
                            }else{
                                // 口语练习模式
                                speakCorrect++;
                                playSound('correct');
                                showPronunciationResult(resultElement, pronScore.score, pronScore.feedback, true, spoken, correct);
                                document.getElementById('nextSpeakBtn').style.display='block';
                            }
                        }else{
                            if(isBattleMode || isSpeakImageMode){
                                // 战斗模式或看图说话模式
                                zHp -= 15;
                                showEff('💢');
                                playSound('wrong');
                                showPronunciationResult(resultElement, pronScore.score, pronScore.feedback, false, spoken, correct);
                                updateHP();
                                
                                if(currentText){
                                    let meaning = getWordMeaning(currentText);
                                    if(meaning){
                                        addToWrongBook(currentText, meaning);
                                    }
                                }
                                
                                setTimeout(function(){showRoundQuestion();},2000);
                            }else{
                                // 口语练习模式
                                playSound('wrong');
                                showPronunciationResult(resultElement, pronScore.score, pronScore.feedback, false, spoken, correct);
                                
                                if(currentText){
                                    let meaning = getWordMeaning(currentText);
                                    if(meaning){
                                        addToWrongBook(currentText, meaning);
                                    }
                                }
                                document.getElementById('nextSpeakBtn').style.display='block';
                            }
                        }
                    }
                }catch(err){
                    console.error('处理语音结果失败:', err);
                    let resultElement = document.getElementById('speakResultArea') || document.getElementById('speakResult');
                    if(resultElement) resultElement.innerHTML='<div style="color:#ff6b6b;">处理结果失败，请重试</div>';
                    
                    // 重置录音状态
                    isRecording = false;
                    isStoppingRecording = true; // 标记为正常结束，防止 onend 重启
                    let recBtn = document.getElementById('recBtn') || document.getElementById('recBtnImage');
                    if(recBtn){
                        recBtn.classList.remove('recording');
                        let recText = document.getElementById('recText') || document.getElementById('recTextImage');
                        if(recText) recText.textContent='点击录音';
                    }
                    // 延迟重置停止标记
                    setTimeout(function(){isStoppingRecording=false;},200);
                }
            };
            
            recognition.onerror=function(e){
                // 忽略主动中止的错误（这是正常行为）
                if(e.error==='aborted'){
                    console.log('录音已中止（正常行为）');
                    return;
                }
                
                console.error('语音识别错误:', e.error);
                
                // 重置录音状态
                isRecording=false;
                isStoppingRecording=true; // 标记为正常结束，防止 onend 重启
                let recBtn = document.getElementById('recBtn') || document.getElementById('recBtnImage');
                let recText = document.getElementById('recText') || document.getElementById('recTextImage');
                let resultEl = document.getElementById('speakResultArea') || document.getElementById('speakResult');
                
                if(recBtn) recBtn.classList.remove('recording');
                if(recText) recText.textContent='点击录音';
                
                // 延迟重置停止标记
                setTimeout(function(){isStoppingRecording=false;},200);
                
                if(!resultEl) return;
                
                if(e.error==='not-allowed'){
                    resultEl.innerHTML='<div style="color:#ff6b6b;">⚠️ 请授权麦克风权限</div><div style="color:#aaa;font-size:12px;margin-top:5px;">在浏览器设置中允许麦克风访问</div>';
                }else if(e.error==='no-speech'){
                    resultEl.innerHTML='<div style="color:#ffd93d;">⚠️ 没有检测到语音</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请对着麦克风说话</div>';
                }else if(e.error==='network'){
                    resultEl.innerHTML='<div style="color:#ff6b6b;">⚠️ 网络错误</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请检查网络连接</div>';
                }else if(e.error==='audio-capture'){
                    resultEl.innerHTML='<div style="color:#ff6b6b;">⚠️ 未检测到麦克风</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请连接麦克风设备</div>';
                }else if(e.error==='language-not-supported'){
                    resultEl.innerHTML='<div style="color:#ff6b6b;">⚠️ 不支持英语识别</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请使用Chrome浏览器</div>';
                }else if(e.error==='timeout'){
                    resultEl.innerHTML='<div style="color:#ffd93d;">⚠️ 录音超时</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请重新尝试</div>';
                }else{
                    resultEl.innerHTML='<div style="color:#ff6b6b;">错误：'+escapeHtml(e.error)+'</div>';
                }
            };
            
            recognition.onend=function(){
                // 如果是主动停止，不重启
                if(isStoppingRecording){
                    console.log('主动停止录音，不重启');
                    return;
                }
                
                // 获取结果元素（战斗模式用 speakResultArea，口语练习用 speakResult）
                let resultEl = document.getElementById('speakResultArea') || document.getElementById('speakResult');
                
                // 只有在没有最终结果且仍在录音状态下才显示结束提示
                if(isRecording && resultEl && !resultEl.innerHTML.includes('正确') && !resultEl.innerHTML.includes('再试一次')){
                    console.log('录音意外结束，尝试重新启动...');
                    // 尝试重新启动录音
                    try{
                        recognition.start();
                        return;
                    }catch(e){
                        console.log('重新启动录音失败:', e);
                        isRecording=false;
                        let recBtn = document.getElementById('recBtn') || document.getElementById('recBtnImage');
                        let recText = document.getElementById('recText') || document.getElementById('recTextImage');
                        if(recBtn) recBtn.classList.remove('recording');
                        if(recText) recText.textContent='点击录音';
                        if(resultEl) resultEl.innerHTML='<div style="color:#ffd93d;">⚠️ 录音已结束</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请重新尝试</div>';
                    }
                }
            };
            
            speechRecognitionReady = true;
            console.log('SpeechRecognition 预初始化完成');
        }catch(e){
            console.error('初始化语音识别失败:', e);
            speechRecognitionReady = false;
        }
    }else{
        console.warn('浏览器不支持语音识别');
    }
}

function startSpeakingPractice(){
    if(window.location.protocol === 'file:'){
        let isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
        if(isChrome){
            showToast('Chrome本地文件不支持语音识别，请使用Edge或部署到服务器');
        }
    }
    startSpeaking();
}

function startSpeaking(){
    speakIdx=0;speakCorrect=0;
    speakData=[];
    battleUnits.forEach(function(u){
        ALL_WORDS[u].words.forEach(function(w){
            speakData.push(w);
        });
    });
    speakData=shuffle(speakData.slice(0,20));
    
    if(!speechRecognitionReady){
        preInitSpeechRecognition();
    }
    
    // 移动端不在页面加载时预授权，避免权限请求失败
    // 权限请求会在用户点击录音按钮时触发
    let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if(!isMobile && recognition){
        // 仅在桌面端预授权
        try{
            recognition.start();
            setTimeout(function(){
                try{recognition.stop();}catch(e){}
            },300);
        }catch(e){
            console.warn('预授权失败:', e);
        }
    }
    
    showSpeakingPracticeQuestion();
    show('speakingGame');
}

function showSpeakingPracticeQuestion(){
    if(speakIdx>=speakData.length){
        endSpeaking();
        return;
    }
    let item=speakData[speakIdx];
    currentText=item[0];
    document.getElementById('speakingProgress').textContent='第 '+(speakIdx+1)+'/'+speakData.length+' 题';
    document.getElementById('speakWord').textContent=item[0].toUpperCase();
    document.getElementById('speakMeaning').textContent=item[1];
    document.getElementById('speakResult').innerHTML='<div style="color:#aaa;">按住按钮说英文</div>';
    
    // 用户自己点击播放，不自动播放
}

// 播放当前单词的读音
function speakCurrentWord(){
    if(currentText){
        speakWord(currentText,'speakListenBtn');
    }
}

function toggleRecord(){
    if(isRecording){
        // 停止录音
        isRecording=false;
        isStoppingRecording=true;
        document.getElementById('recBtn').classList.remove('recording');
        document.getElementById('recText').textContent='点击录音';
        try{recognition.abort();}catch(e){}
        setTimeout(function(){isStoppingRecording=false;},200);
    }else{
        // 开始录音
        startRecording();
    }
}

function startRecording(){
    console.log('startRecording 被调用');
    console.log('当前协议:', window.location.protocol);
    console.log('当前主机名:', window.location.hostname);
    
    if(window.location.protocol !== 'https:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1'){
        document.getElementById('speakResult').innerHTML='<div style="color:#ff6b6b;">⚠️ 语音识别需要HTTPS环境</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请使用HTTPS连接访问</div>';
        return;
    }
    
    if(window.location.protocol === 'file:'){
        let isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
        if(isChrome){
            document.getElementById('speakResult').innerHTML='<div style="color:#ff6b6b;">⚠️ Chrome本地文件不支持语音识别</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请使用Edge浏览器，或将文件部署到服务器</div>';
            return;
        }
    }
    
    if(!recognition){
        console.log('recognition 未初始化，尝试初始化...');
        preInitSpeechRecognition();
    }
    
    if(!recognition){
        console.error('recognition 初始化失败');
        document.getElementById('speakResult').innerHTML='<div style="color:#ff6b6b;">⚠️ 浏览器不支持语音识别</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请使用Chrome或Edge浏览器</div>';
        return;
    }
    
    console.log('recognition 已准备好，准备启动录音');
    
    document.getElementById('nextSpeakBtn').style.display='none';
    
    // 清除之前的超时
    if(recordingTimeout){
        clearTimeout(recordingTimeout);
        recordingTimeout = null;
    }
    
    // 先停止之前的识别
    isStoppingRecording = true;
    try{
        recognition.abort();
    }catch(stopErr){}
    
    // 更新UI
    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('recText').textContent='点击停止';
    document.getElementById('speakResult').innerHTML='<div style="color:#ffd93d;">🎤 正在录音...</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请说英文单词</div>';
    
    // 设置超时检测，防止录音状态卡死
    recordingTimeout = setTimeout(function(){
        if(isRecording){
            console.warn('录音超时，自动停止');
            isRecording = false;
            isStoppingRecording = true;
            document.getElementById('recBtn').classList.remove('recording');
            document.getElementById('recText').textContent='点击录音';
            document.getElementById('speakResult').innerHTML='<div style="color:#ffd93d;">⚠️ 录音超时</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请重新尝试</div>';
            try{ recognition.abort(); }catch(e){}
            setTimeout(function(){isStoppingRecording=false;},200);
        }
    }, 15000);
    
    // 延迟后启动新识别
    setTimeout(function(){
        isStoppingRecording = true;
        
        try{
            let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            console.log('是否移动设备:', isMobile);
            
            console.log('调用 recognition.start()...');
            recognition.start();
            console.log('recognition.start() 调用成功');
            
            isStoppingRecording = false;
            isRecording = true;
        }catch(e){
            console.error('启动录音失败:', e);
            console.error('错误名称:', e.name);
            console.error('错误消息:', e.message);
            clearTimeout(recordingTimeout);
            isRecording=false;
            isStoppingRecording=false;
            document.getElementById('recBtn').classList.remove('recording');
            document.getElementById('recText').textContent='点击录音';
            
            if(e.name === 'NotAllowedError' || e.message.indexOf('not allowed') !== -1){
                document.getElementById('speakResult').innerHTML='<div style="color:#ff6b6b;">⚠️ 麦克风权限被拒绝</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请在浏览器地址栏左侧允许麦克风访问</div>';
            }else if(e.message.indexOf('already started') !== -1){
                document.getElementById('speakResult').innerHTML='<div style="color:#ffd93d;">⚠️ 录音已在运行</div><div style="color:#aaa;font-size:12px;margin-top:5px;">请直接说话</div>';
            }else if(e.message.indexOf('https') !== -1 || e.message.indexOf('secure') !== -1){
                document.getElementById('speakResult').innerHTML='<div style="color:#ff6b6b;">⚠️ 需要HTTPS连接</div><div style="color:#aaa;font-size:12px;margin-top:5px;">语音识别在移动设备上需要HTTPS环境</div>';
            }else{
                document.getElementById('speakResult').innerHTML='<div style="color:#ff6b6b;">启动录音失败</div><div style="color:#aaa;font-size:12px;margin-top:5px;">'+escapeHtml(e.message || '未知错误')+'</div>';
            }
        }
    }, 500);
}

function nextSpeakQuestion(){
    speakIdx++;
    document.getElementById('nextSpeakBtn').style.display='none';
    showSpeakingPracticeQuestion();
}

function endSpeaking(){
    let score_add=speakCorrect*20;
    document.getElementById('resultEmoji').textContent='🎤';
    document.getElementById('resultTitle').textContent='口语练习完成！';
    document.getElementById('resultScore').textContent='+'+score_add;
    document.getElementById('resultMsg').textContent='正确：'+speakCorrect+'/'+speakData.length;
    document.getElementById('resultStars').innerHTML='⭐'.repeat(Math.ceil(speakCorrect/2));
    document.getElementById('nextBtn').style.display='none';
    show('result');
}

// ========== 工具函数 ==========
function escapeHtml(text){
    if(typeof text !== 'string') return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function speakWord(w, btnId){
    if(!w){
        console.warn('speakWord: 空单词');
        return;
    }
    
    let btn=btnId?document.getElementById(btnId):null;
    if(btn){
        btn.classList.add('playing');
        let spanEl = btn.querySelector('span:last-child');
        if(spanEl) spanEl.textContent='播放中...';
    }
    
    if(!('speechSynthesis' in window)){
        console.warn('浏览器不支持语音合成');
        showToast('浏览器不支持语音播放');
        if(btn){
            btn.classList.remove('playing');
            let spanEl = btn.querySelector('span:last-child');
            if(spanEl) spanEl.textContent='听发音';
        }
        return;
    }
    
    // 备选方案：使用Web Audio API生成简单的提示音
    function playFallbackSound(){
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
            
            setTimeout(() => {
                if(btn){
                    btn.classList.remove('playing');
                    let spanEl = btn.querySelector('span:last-child');
                    if(spanEl) spanEl.textContent='听发音';
                }
            }, 300);
        } catch (e) {
            console.warn('播放备选声音失败:', e);
        }
    }
    
    function doSpeak(retryCount){
        retryCount = retryCount || 0;
        
        try{
            window.speechSynthesis.cancel();
            
            let voices = window.speechSynthesis.getVoices();
            
            if(voices.length === 0 && retryCount < 5){
                console.log('等待语音列表加载... 尝试 ' + (retryCount + 1));
                window.speechSynthesis.getVoices();
                setTimeout(function(){ doSpeak(retryCount + 1); }, 200);
                return;
            }
            
            let u = new SpeechSynthesisUtterance(w);
            u.lang='en-US';
            u.rate=speechRate;
            u.pitch=1;
            u.volume=1;
            
            let foundVoice = false;
            for(let i=0;i<voices.length;i++){
                if(voices[i].lang.indexOf('en')===0){
                    u.voice = voices[i];
                    foundVoice = true;
                    break;
                }
            }
            
            if(!foundVoice && voices.length > 0){
                u.voice = voices[0];
            }
            
            u.onend=function(){
                if(btn){
                    btn.classList.remove('playing');
                    let spanEl = btn.querySelector('span:last-child');
                    if(spanEl) spanEl.textContent='听发音';
                }
            };
            
            u.onerror=function(e){
                console.error('TTS error:', e);
                if(btn){
                    btn.classList.remove('playing');
                    let spanEl = btn.querySelector('span:last-child');
                    if(spanEl) spanEl.textContent='听发音';
                }
                
                if(e.error === 'not-allowed'){
                    showToast('浏览器阻止了语音播放');
                }else if(e.error === 'synthesis-failed'){
                    console.log('语音合成失败，尝试备选方案');
                    playFallbackSound();
                    showToast('语音播放失败，已使用提示音替代');
                }else if(e.error !== 'canceled' && e.error !== 'interrupted'){
                    showToast('语音播放失败: ' + e.error);
                }
            };
            
            // 尝试播放
            window.speechSynthesis.speak(u);
            
            // 检查是否真的在播放
            setTimeout(function(){
                if(!window.speechSynthesis.speaking && retryCount < 3){
                    console.log('语音未播放，重试...');
                    window.speechSynthesis.cancel();
                    setTimeout(function(){
                        try {
                            window.speechSynthesis.speak(u);
                        } catch (e) {
                            console.error('重试播放失败:', e);
                            playFallbackSound();
                            showToast('语音播放失败，已使用提示音替代');
                        }
                    }, 100);
                }
            }, 100);
            
        }catch(e){
            console.error('TTS speak error:', e);
            showToast('语音播放失败，已使用提示音替代');
            playFallbackSound();
        }
    }
    
    doSpeak(0);
}

function shuffle(a){
    return a.slice().sort(function(){return Math.random()-0.5;});
}

init();
