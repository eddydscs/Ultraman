<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>赛罗奥特曼英语大作战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 50%, #0f2040 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        .container { max-width: 500px; margin: 0 auto; padding: 15px; position: relative; z-index: 1; }
        
        @media (min-width: 768px) {
            .container { max-width: 100%; width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; }
            .card { width: 90%; max-width: 550px; }
        }
        
        .zero-header { text-align: center; padding: 15px 0; }
        .zero-icon { font-size: 80px; animation: zeroPulse 2s infinite; display: inline-block; filter: drop-shadow(0 0 20px rgba(0,200,255,0.8)); }
        @keyframes zeroPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .title { font-size: 22px; font-weight: bold; text-align: center; background: linear-gradient(45deg, #00d4ff, #ff6b35, #ffd93d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 8px 0; }
        .subtitle { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 10px; }
        
        .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.15); }
        
        .score-panel { display: flex; justify-content: space-around; margin: 10px 0; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid rgba(0,200,255,0.3); }
        .score-item { text-align: center; }
        .score-value { font-size: 22px; font-weight: bold; color: #ffd93d; }
        .score-label { font-size: 11px; color: #aaa; }
        
        .stage-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .stage-btn { aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; background: rgba(255,255,255,0.05); color: white; font-size: 24px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s; }
        .stage-btn.unlocked { border-color: rgba(0,200,255,0.5); background: rgba(0,200,255,0.1); }
        .stage-btn.current { border-color: #00d4ff; background: linear-gradient(135deg, rgba(0,200,255,0.3), rgba(255,100,0,0.3)); animation: pulse 1.5s infinite; }
        .stage-btn.locked { opacity: 0.4; }
        .stage-btn.completed { border-color: #27ae60; background: rgba(39,174,96,0.2); }
        .stage-num { font-size: 11px; margin-top: 2px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .game-btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; }
        .game-btn:active { transform: scale(0.95); }
        .btn-battle { background: linear-gradient(135deg, #ff6b35, #ff3366); }
        .btn-free { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        
        .battle-arena { text-align: center; padding: 10px; }
        .vs-text { font-size: 20px; font-weight: bold; color: #ff3366; }
        .fighter { font-size: 55px; display: inline-block; }
        .hp-container { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .hp-section { text-align: center; flex: 1; }
        .hp-name { font-size: 13px; color: #00d4ff; margin-bottom: 3px; }
        .hp-name.monster { color: #ff6b6b; }
        .hp-bar-fight { height: 14px; background: #222; border-radius: 7px; overflow: hidden; margin: 3px 8px; }
        .hp-fill-zero { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff88); transition: width 0.5s; }
        .hp-fill-monster { height: 100%; background: linear-gradient(90deg, #ff3366, #ff6b6b); transition: width 0.5s; }
        
        .monster-info { text-align: center; padding: 8px; background: rgba(255,0,0,0.1); border-radius: 10px; margin: 8px 0; border: 1px solid rgba(255,0,0,0.3); }
        .monster-name { font-size: 15px; color: #ff6b6b; font-weight: bold; }
        .monster-desc { font-size: 11px; color: #aaa; margin-top: 3px; }
        
        .question-type { display: inline-block; padding: 4px 12px; background: linear-gradient(135deg, #9b59b6, #8e44ad); border-radius: 15px; font-size: 12px; margin: 5px 0; }
        .question-type.match { background: linear-gradient(135deg, #00d4ff, #0099ff); }
        .question-type.hearing { background: linear-gradient(135deg, #f39c12, #e74c3c); }
        .question-type.puzzle { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .question-type.speak { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        
        .word-display { text-align: center; font-size: 28px; font-weight: bold; color: #00d4ff; margin: 12px 0; }
        .meaning-display { text-align: center; color: #ffd93d; font-size: 18px; margin: 8px 0; }
        
        .voice-btn-container { text-align: center; margin: 8px 0; }
        .voice-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 20px; background: linear-gradient(135deg, #00d4ff, #00ff88); border: none; border-radius: 20px; color: #0a0a1a; font-size: 14px; font-weight: bold; cursor: pointer; }
        .voice-btn.playing { background: linear-gradient(135deg, #ffd93d, #ff6b35); animation: vPulse 0.5s infinite; }
        @keyframes vPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .speak-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 25px; background: linear-gradient(135deg, #f39c12, #e74c3c); border: none; border-radius: 25px; color: white; font-size: 15px; font-weight: bold; cursor: pointer; margin: 10px; }
        .speak-btn.recording { background: linear-gradient(135deg, #e74c3c, #c0392b); animation: recPulse 0.8s infinite; }
        @keyframes recPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.7); } 50% { box-shadow: 0 0 0 12px rgba(231,76,60,0); } }
        
        .option-btn { display: block; width: 100%; padding: 12px; margin: 5px 0; border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; font-size: 15px; background: rgba(255,255,255,0.08); color: white; cursor: pointer; }
        .option-btn.correct { background: rgba(39, 174, 96, 0.5); border-color: #27ae60; }
        .option-btn.wrong { background: rgba(231, 76, 60, 0.5); border-color: #e74c3c; }
        
        .progress { text-align: center; color: #aaa; margin: 6px 0; font-size: 12px; }
        
        .result { text-align: center; padding: 15px 0; }
        .result-title { font-size: 24px; margin: 10px 0; }
        .result-score { font-size: 45px; font-weight: bold; color: #ffd93d; }
        .result-stars { font-size: 26px; margin: 10px 0; }
        
        .hidden { display: none !important; }
        
        .attack-effect { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; animation: attAnim 0.5s forwards; z-index: 100; pointer-events: none; }
        @keyframes attAnim { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } }
        
        .letters-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 10px 0; }
        .letter-btn { width: 40px; height: 40px; border: 2px solid #00d4ff; border-radius: 8px; background: rgba(0,200,255,0.1); color: #00d4ff; font-size: 18px; font-weight: bold; cursor: pointer; }
        .letter-btn.used { opacity: 0.3; pointer-events: none; }
        
        .input-display { text-align: center; font-size: 24px; color: #00d4ff; margin: 10px 0; min-height: 30px; letter-spacing: 4px; }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <!-- 主菜单 -->
        <div id="menu" class="card">
            <div class="zero-header">
                <div class="zero-icon">🦸</div>
                <div class="title">⚔️ 赛罗奥特曼英语大作战 ⚔️</div>
                <div class="subtitle">打败10个怪兽，守护地球！</div>
            </div>
            <div class="score-panel">
                <div class="score-item"><div class="score-value" id="totalScore">0</div><div class="score-label">⚡能量</div></div>
                <div class="score-item"><div class="score-value" id="currentStage">1</div><div class="score-label">🎯关卡</div></div>
                <div class="score-item"><div class="score-value" id="monstersDefeated">0</div><div class="score-label">👹击败</div></div>
            </div>
            <div class="progress">选择关卡挑战怪兽</div>
            <div class="stage-grid" id="stageGrid"></div>
            <button class="game-btn btn-battle" onclick="startBattle()">⚔️ 开始战斗</button>
            <button class="game-btn btn-free" onclick="startFreeMode()">🎮 自由练习</button>
            <button class="game-btn btn-speak" onclick="startSpeakingPractice()">🎤 口语练习</button>
        </div>
        
        <!-- 战斗界面 -->
        <div id="battleGame" class="card hidden">
            <div class="title">⚔️ 第 <span id="stageNum">1</span> 关</div>
            <div class="battle-arena">
                <div class="hp-container">
                    <div class="hp-section"><div class="hp-name">赛罗</div><div class="hp-bar-fight"><div class="hp-fill-zero" id="zeroHp" style="width:100%"></div></div></div>
                    <div class="vs-text">VS</div>
                    <div class="hp-section"><div class="hp-name monster" id="monsterHpName">怪兽</div><div class="hp-bar-fight"><div class="hp-fill-monster" id="monsterHp" style="width:100%"></div></div></div>
                </div>
                <div><span class="fighter">🦸</span><span class="vs-text" style="font-size:16px;margin:0 10px;">⚔️</span><span class="fighter" id="monsterEmoji">👾</span></div>
            </div>
            <div class="monster-info"><div class="monster-name" id="monsterName">小怪兽</div><div class="monster-desc" id="monsterDesc">打败它！</div></div>
            <div class="progress" id="battleProgress">第 1/5 题</div>
            <div id="questionArea"></div>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <!-- 自由练习 -->
        <div id="freeMode" class="card hidden">
            <div class="title">🎮 自由练习</div>
            <div class="progress">选择单元</div>
            <div class="stage-grid" id="unitSelector" style="grid-template-columns: repeat(5, 1fr);"></div>
            <button class="game-btn btn-battle" onclick="startFreeBattle()">⚔️ 开始练习</button>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <!-- 口语练习（独立） -->
        <div id="speakingPractice" class="card hidden">
            <div class="title">🎤 口语练习</div>
            <div class="progress">选择单元</div>
            <div class="stage-grid" id="speakUnitSelector" style="grid-template-columns: repeat(5, 1fr);"></div>
            <button class="game-btn btn-speak" onclick="startSpeaking()">🎙️ 开始练习</button>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <!-- 口语界面 -->
        <div id="speakingGame" class="card hidden">
            <div class="title">🎤 口语练习</div>
            <div class="progress" id="speakingProgress">第 1/10 题</div>
            <div class="word-display" id="speakWord">HELLO</div>
            <div class="meaning-display" id="speakMeaning">你好</div>
            <div class="voice-btn-container"><button class="voice-btn" id="speakListenBtn" onclick="speakWord('','speakListenBtn')"><span>🔊</span><span>听示范</span></button></div>
            <div style="text-align:center;margin:15px 0;">
                <button class="speak-btn" id="recBtn"
                    onmousedown="startHoldRecord()" onmouseup="stopHoldRecord()" onmouseleave="stopHoldRecord()"
                    ontouchstart="startHoldRecord()" ontouchend="stopHoldRecord()">
                    <span>🎙️</span><span id="recText">按住录音</span>
                </button>
            </div>
            <div id="speakResult" style="text-align:center;padding:10px;background:rgba(0,0,0,0.3);border-radius:10px;margin:8px 0;">
                <div style="color:#aaa;">按住按钮说英文</div>
            </div>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <!-- 结果 -->
        <div id="result" class="card hidden">
            <div class="result">
                <div style="font-size:55px;" id="resultEmoji">🏆</div>
                <div class="result-title" id="resultTitle">太棒了！</div>
                <div class="result-score" id="resultScore">+100</div>
                <div class="progress" id="resultMsg">正确：5/5</div>
                <div class="result-stars" id="resultStars"></div>
                <button class="game-btn btn-battle" id="nextBtn" onclick="nextStage()">🚀 下一关</button>
                <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
            </div>
        </div>
    </div>

<script>
// 词汇库
const ALL_WORDS = {
    1:{words:[["hello","你好"],["hi","嗨"],["goodbye","再见"],["good morning","早上好"],["name","名字"],["I","我"],["am","是"],["nice","高兴"],["meet","遇见"],["too","也"]],sentences:[["Hello!","你好！"],["What's your name?","你叫什么名字？"],["Nice to meet you.","很高兴认识你。"]]},
    2:{words:[["one","一"],["two","二"],["three","三"],["four","四"],["five","五"],["six","六"],["seven","七"],["eight","八"],["nine","九"],["ten","十"]],sentences:[["How many?","有多少？"],["I can count.","我会数数。"]]},
    3:{words:[["red","红色"],["blue","蓝色"],["yellow","黄色"],["green","绿色"],["orange","橙色"],["purple","紫色"],["pink","粉色"],["black","黑色"],["white","白色"]],sentences:[["What color?","什么颜色？"],["It's red.","它是红色的。"]]},
    4:{words:[["cat","猫"],["dog","狗"],["bird","小鸟"],["fish","鱼"],["rabbit","兔子"],["monkey","猴子"],["elephant","大象"],["tiger","老虎"],["lion","狮子"]],sentences:[["I have a cat.","我有一只猫。"]]},
    5:{words:[["mum","妈妈"],["dad","爸爸"],["sister","姐妹"],["brother","兄弟"],["grandma","奶奶"],["grandpa","爷爷"],["family","家庭"]],sentences:[["This is my mum.","这是我的妈妈。"]]},
    6:{words:[["apple","苹果"],["banana","香蕉"],["orange","橙子"],["milk","牛奶"],["water","水"],["juice","果汁"],["bread","面包"],["egg","鸡蛋"],["cake","蛋糕"]],sentences:[["I like apples.","我喜欢苹果。"]]},
    7:{words:[["head","头"],["eye","眼睛"],["ear","耳朵"],["nose","鼻子"],["mouth","嘴巴"],["hand","手"],["finger","手指"],["arm","胳膊"],["leg","腿"]],sentences:[["Touch your head.","摸摸你的头。"]]},
    8:{words:[["run","跑"],["jump","跳"],["walk","走"],["sit","坐"],["stand","站"],["sleep","睡觉"],["eat","吃"],["drink","喝"],["play","玩"]],sentences:[["I can run.","我会跑。"]]},
    9:{words:[["ball","球"],["toy","玩具"],["car","汽车"],["doll","娃娃"],["bear","熊"],["balloon","气球"],["kite","风筝"],["book","书"],["pen","笔"]],sentences:[["This is my ball.","这是我的球。"]]},
    10:{words:[["on","在...上"],["in","在...里"],["under","在...下"],["near","靠近"],["where","在哪里"],["table","桌子"],["chair","椅子"],["box","盒子"]],sentences:[["Where is it?","它在哪里？"]]}
};

// 10个怪兽
const MONSTERS = [
    {emoji:"👾",name:"小怪兽",desc:"外太空来的捣蛋鬼"},
    {emoji:"🤖",name:"机器人",desc:"邪恶科学家的作品"},
    {emoji:"👹",name:"红魔",desc:"火焰山的恶魔"},
    {emoji:"👺",name:"天狗",desc:"传说中的妖怪"},
    {emoji:"👻",name:"幽灵王",desc:"黑暗统治者"},
    {emoji:"💀",name:"骷髅将军",desc:"不死军团首领"},
    {emoji:"🎃",name:"南瓜魔王",desc:"万圣节恶灵"},
    {emoji:"👽",name:"外星霸主",desc:"银河系威胁"},
    {emoji:"🦖",name:"暴龙兽",desc:"远古恐龙复活"},
    {emoji:"🐉",name:"暗黑龙",desc:"最终BOSS"}
];

let score=0, currentStage=1, monstersDef=0;
let selectedUnit=1, qIdx=0, correctCount=0;
let mHp=100, zHp=100, currentMonster=null;
let currentText='';
let recognition=null, isRecording=false;
let stageCompleted = [];

// 预加载语音列表
if('speechSynthesis' in window){
    // Chrome 需要等待 voices loaded
    window.speechSynthesis.onvoiceschanged = function(){
        let voices = window.speechSynthesis.getVoices();
        console.log('Voices loaded:', voices.length);
    };
    // 立即尝试获取一次
    setTimeout(function(){
        let voices = window.speechSynthesis.getVoices();
        if(voices.length === 0){
            window.speechSynthesis.getVoices();
        }
    },100);
}

function init(){
    createStars();
    loadProgress();
    createStageGrid();
    updateUI();
    
    // 电脑端：首次点击激活音频
    document.body.addEventListener('click', function initAudio(){
        // 播放一个静音的音频来激活
        if('speechSynthesis' in window){
            let u = new SpeechSynthesisUtterance('');
            u.volume = 0;
            window.speechSynthesis.speak(u);
        }
        // 只执行一次
        document.body.removeEventListener('click', initAudio);
    }, {once: true});
}

function createStars(){
    for(let i=0;i<50;i++){
        let s=document.createElement('div');
        s.className='star';
        s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(Math.random()*3+1)+'px;height:'+(Math.random()*3+1)+'px';
        document.getElementById('stars').appendChild(s);
    }
}

function loadProgress(){
    try{
        let saved = localStorage.getItem('ultraman_progress');
        if(saved){
            let data = JSON.parse(saved);
            currentStage = data.stage || 1;
            score = data.score || 0;
            monstersDef = data.monstersDef || 0;
            stageCompleted = data.completed || [];
        }
    }catch(e){}
}

function saveProgress(){
    try{
        localStorage.setItem('ultraman_progress', JSON.stringify({
            stage: currentStage,
            score: score,
            monstersDef: monstersDef,
            completed: stageCompleted
        }));
    }catch(e){}
}

function createStageGrid(){
    let grid=document.getElementById('stageGrid');
    grid.innerHTML='';
    for(let i=1;i<=10;i++){
        let btn=document.createElement('button');
        btn.className='stage-btn';
        btn.id='stage'+i;
        
        if(stageCompleted.includes(i)){
            btn.classList.add('completed');
        }else if(i===currentStage){
            btn.classList.add('current');
        }else if(i<currentStage){
            btn.classList.add('unlocked');
        }else{
            btn.classList.add('locked');
        }
        
        btn.innerHTML='<span>'+MONSTERS[i-1].emoji+'</span><span class="stage-num">'+i+'</span>';
        btn.onclick=function(){selectStage(i);};
        grid.appendChild(btn);
    }
}

function selectStage(s){
    if(s<=currentStage){
        currentStage=s;
        createStageGrid();
        updateUI();
    }
}

function updateUI(){
    document.getElementById('totalScore').textContent=score;
    document.getElementById('currentStage').textContent=currentStage;
    document.getElementById('monstersDefeated').textContent=monstersDef;
}

function show(id){
    document.querySelectorAll('.card').forEach(function(c){c.classList.add('hidden');});
    document.getElementById(id).classList.remove('hidden');
}

function backToMenu(){
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    createStageGrid();
    updateUI();
    show('menu');
}

// ========== 主线战斗模式 ==========
function startBattle(){
    qIdx=0;correctCount=0;mHp=100;zHp=100;
    currentMonster=MONSTERS[currentStage-1];
    
    document.getElementById('stageNum').textContent=currentStage;
    document.getElementById('monsterEmoji').textContent=currentMonster.emoji;
    document.getElementById('monsterName').textContent=currentMonster.name;
    document.getElementById('monsterDesc').textContent=currentMonster.desc;
    document.getElementById('monsterHpName').textContent=currentMonster.name;
    
    updateHP();
    showQuestion();
    show('battleGame');
}

function updateHP(){
    document.getElementById('monsterHp').style.width=mHp+'%';
    document.getElementById('zeroHp').style.width=zHp+'%';
}

// 生成题目：4种类型随机（暂时移除口语）
function showQuestion(){
    if(qIdx>=5 || mHp<=0 || zHp<=0){
        endBattle();
        return;
    }
    
    document.getElementById('battleProgress').textContent='第 '+(qIdx+1)+'/5 题';
    
    // 随机选择题型（暂时移除口语挑战）
    let types=['choice','match','hearing','puzzle'];
    let type=types[Math.floor(Math.random()*types.length)];
    
    // 根据关卡选择单元词汇
    let unitData = ALL_WORDS[currentStage];
    let words = unitData.words;
    let word = words[Math.floor(Math.random()*words.length)];
    
    let area = document.getElementById('questionArea');
    
    if(type==='choice'){
        showChoiceQuestion(area, word, words);
    }else if(type==='speak'){
        showSpeakQuestion(area, word);
    }else if(type==='match'){
        showMatchQuestion(area, word, words);
    }else if(type==='hearing'){
        showHearingQuestion(area, word, words);
    }else if(type==='puzzle'){
        showPuzzleQuestion(area, word);
    }
}

// 选择题
function showChoiceQuestion(area, word, words){
    currentText=word[0];
    area.innerHTML='<div class="question-type">单词选择</div>'+
        '<div class="word-display">'+word[0]+'</div>'+
        '<div class="meaning-display">'+word[1]+'</div>'+
        '<div class="voice-btn-container"><button class="voice-btn" id="choiceVoiceBtn" onclick="speakWord(\''+word[0]+'\',\'choiceVoiceBtn\')"><span>🔊</span><span>听发音</span></button></div>'+
        '<div id="options"></div>';
    
    let wrong=words.filter(function(w){return w[0]!==word[0];}).map(function(w){return w[1];});
    let opts=shuffle([word[1]].concat(wrong.slice(0,3)));
    let optArea=document.getElementById('options');
    
    opts.forEach(function(o){
        let b=document.createElement('button');
        b.className='option-btn';
        b.textContent=o;
        b.onclick=function(){checkAnswer(o===word[1], this);};
        optArea.appendChild(b);
    });
    
    // 自动播放发音
    setTimeout(function(){speakWord(word[0],'choiceVoiceBtn');},500);
}

// 拼写题
function showPuzzleQuestion(area, word){
    currentText=word[0];
    let letters=word[0].toUpperCase().split('');
    let shuffled=shuffle(letters.slice());
    
    let html='<div class="question-type puzzle">🧩 单词拼图</div>'+
        '<div class="meaning-display" style="font-size:24px;margin:15px 0;">'+word[1]+'</div>'+
        '<div class="voice-btn-container"><button class="voice-btn" id="puzzleVoiceBtn" onclick="speakWord(\''+word[0]+'\',\'puzzleVoiceBtn\')"><span>🔊</span><span>听发音</span></button></div>'+
        '<div class="input-display" id="inputDisplay"></div>'+
        '<div class="letters-grid" id="lettersGrid"></div>';
    
    area.innerHTML=html;
    
    window.puzzleAnswer=[];
    window.puzzleButtons=[];
    
    let grid=document.getElementById('lettersGrid');
    shuffled.forEach(function(l, idx){
        let b=document.createElement('button');
        b.className='letter-btn';
        b.textContent=l;
        b.dataset.index=idx;
        b.dataset.letter=l;
        b.onclick=function(){toggleLetter(l, idx, this);};
        grid.appendChild(b);
        window.puzzleButtons.push({letter:l, btn:b, used:false});
    });
    
    // 自动播放发音
    setTimeout(function(){speakWord(word[0],'puzzleVoiceBtn');},500);
}

function toggleLetter(letter, idx, btn){
    // 如果已经使用，点击取消
    if(window.puzzleButtons[idx].used){
        window.puzzleButtons[idx].used=false;
        btn.classList.remove('used');
        window.puzzleAnswer=window.puzzleAnswer.filter(function(item){return item.index!==idx;});
    }else{
        // 如果未使用，点击选中
        window.puzzleButtons[idx].used=true;
        btn.classList.add('used');
        window.puzzleAnswer.push({letter:letter, index:idx});
    }
    
    // 更新显示
    let display=window.puzzleAnswer.map(function(item){return item.letter;}).join('');
    document.getElementById('inputDisplay').textContent=display;
    
    // 检查是否完成
    if(window.puzzleAnswer.length>=currentText.length){
        setTimeout(function(){
            let answer=window.puzzleAnswer.map(function(item){return item.letter;}).join('').toLowerCase();
            checkAnswer(answer===currentText.toLowerCase(), null);
        },300);
    }
}

function checkAnswer(correct, btn){
    if(correct){
        correctCount++;
        mHp-=20;
        showEff('💥');
        if(btn) btn.classList.add('correct');
    }else{
        zHp-=15;
        showEff('💢');
        if(btn) btn.classList.add('wrong');
    }
    updateHP();
    setTimeout(function(){qIdx++;showQuestion();},800);
}

function showEff(e){
    let d=document.createElement('div');
    d.className='attack-effect';
    d.textContent=e;
    document.body.appendChild(d);
    setTimeout(function(){d.remove();},500);
}

function endBattle(){
    let won=mHp<=0;
    let g=correctCount*20;
    score+=g;
    
    if(won){
        monstersDef++;
        if(!stageCompleted.includes(currentStage)){
            stageCompleted.push(currentStage);
        }
        if(currentStage<10 && !stageCompleted.includes(currentStage+1)){
            currentStage++;
        }
        saveProgress();
    }
    
    document.getElementById('resultEmoji').textContent=won?'🏆':'💪';
    document.getElementById('resultTitle').textContent=won?'打败了 '+currentMonster.name+'！':'继续努力！';
    document.getElementById('resultScore').textContent='+'+g;
    document.getElementById('resultMsg').textContent='正确：'+correctCount+'/5';
    document.getElementById('resultStars').innerHTML='⭐'.repeat(correctCount);
    document.getElementById('nextBtn').style.display=won&&currentStage<=10?'block':'none';
    
    updateUI();
    show('result');
}

function nextStage(){
    if(currentStage<=10){
        startBattle();
    }else{
        backToMenu();
    }
}

// ========== 自由练习模式 ==========
function startFreeMode(){
    let selector=document.getElementById('unitSelector');
    selector.innerHTML='';
    for(let i=1;i<=10;i++){
        let btn=document.createElement('button');
        btn.className='stage-btn '+(i===selectedUnit?'current':'unlocked');
        btn.innerHTML='<span>U</span><span class="stage-num">'+i+'</span>';
        btn.onclick=function(){
            selectedUnit=i;
            selector.querySelectorAll('.stage-btn').forEach(function(b){b.classList.remove('current');});
            btn.classList.add('current');
        };
        selector.appendChild(btn);
    }
    show('freeMode');
}

function startFreeBattle(){
    qIdx=0;correctCount=0;mHp=100;zHp=100;
    currentMonster=MONSTERS[selectedUnit-1];
    
    document.getElementById('stageNum').textContent=selectedUnit;
    document.getElementById('monsterEmoji').textContent=currentMonster.emoji;
    document.getElementById('monsterName').textContent=currentMonster.name;
    document.getElementById('monsterDesc').textContent=currentMonster.desc;
    document.getElementById('monsterHpName').textContent=currentMonster.name;
    
    // 临时替换关卡
    currentStage=selectedUnit;
    
    updateHP();
    showQuestion();
    show('battleGame');
}

// ========== 口语练习（独立） ==========
let speakIdx=0, speakCorrect=0, speakData=[], speakUnit=1;

function startSpeakingPractice(){
    let selector=document.getElementById('speakUnitSelector');
    selector.innerHTML='';
    for(let i=1;i<=10;i++){
        let btn=document.createElement('button');
        btn.className='stage-btn '+(i===speakUnit?'current':'unlocked');
        btn.innerHTML='<span>U</span><span class="stage-num">'+i+'</span>';
        btn.onclick=function(){
            speakUnit=i;
            selector.querySelectorAll('.stage-btn').forEach(function(b){b.classList.remove('current');});
            btn.classList.add('current');
        };
        selector.appendChild(btn);
    }
    show('speakingPractice');
}

function startSpeaking(){
    speakIdx=0;speakCorrect=0;
    speakData=[];
    let unitData = ALL_WORDS[speakUnit];
    speakData = shuffle(unitData.words.slice());
    showSpeakQuestion();
    show('speakingGame');
}

function showSpeakQuestion(){
    if(speakIdx>=speakData.length){
        endSpeaking();
        return;
    }
    let item=speakData[speakIdx];
    currentText=item[0];
    document.getElementById('speakingProgress').textContent='第 '+(speakIdx+1)+'/'+speakData.length+' 题';
    document.getElementById('speakWord').textContent=item[0].toUpperCase();
    document.getElementById('speakMeaning').textContent=item[1];
    document.getElementById('speakResult').innerHTML='<div style="color:#aaa;">按住按钮说英文</div>';
    
    // 自动播放示范
    setTimeout(function(){speakWord(item[0],'speakListenBtn');},500);
}

function startHoldRecord(){
    let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){
        document.getElementById('speakResult').innerHTML='<div style="color:#ff6b6b;">不支持语音识别，请用Chrome</div>';
        return;
    }
    
    recognition=new SpeechRecognition();
    recognition.lang='en-US';
    recognition.continuous=false;
    recognition.interimResults=false;
    
    recognition.onresult=function(e){
        let spoken=e.results[0][0].transcript.toLowerCase();
        let correct=currentText.toLowerCase();
        
        if(spoken.includes(correct)||correct.includes(spoken)){
            speakCorrect++;
            document.getElementById('speakResult').innerHTML='<div style="color:#27ae60;font-size:18px;">✅ 正确！</div><div style="color:#aaa;font-size:13px;">你说：'+spoken+'</div>';
        }else{
            document.getElementById('speakResult').innerHTML='<div style="color:#e74c3c;font-size:18px;">❌ 再试一次</div><div style="color:#aaa;font-size:13px;">你说：'+spoken+'<br>答案：'+correct+'</div>';
        }
    };
    
    recognition.onerror=function(e){
        document.getElementById('speakResult').innerHTML='<div style="color:#ff6b6b;">错误：'+e.error+'</div>';
    };
    
    isRecording=true;
    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('recText').textContent='松开结束';
    document.getElementById('speakResult').innerHTML='<div style="color:#ffd93d;">🎤 正在录音...</div>';
    
    try{recognition.start();}catch(e){}
}

function stopHoldRecord(){
    if(!isRecording) return;
    isRecording=false;
    document.getElementById('recBtn').classList.remove('recording');
    document.getElementById('recText').textContent='按住录音';
    
    try{recognition.stop();}catch(e){}
    
    setTimeout(function(){
        speakIdx++;
        showSpeakQuestion();
    },1500);
}

function endSpeaking(){
    let score_add=speakCorrect*20;
    document.getElementById('resultEmoji').textContent='🎤';
    document.getElementById('resultTitle').textContent='口语练习完成！';
    document.getElementById('resultScore').textContent='+'+score_add;
    document.getElementById('resultMsg').textContent='正确：'+speakCorrect+'/'+speakData.length;
    document.getElementById('resultStars').innerHTML='⭐'.repeat(Math.ceil(speakCorrect/2));
    document.getElementById('nextBtn').style.display='none';
    show('result');
}

// ========== 工具函数 ==========
function speakWord(w, btnId){
    if(!w)return;
    let btn=btnId?document.getElementById(btnId):null;
    if(btn){
        btn.classList.add('playing');
        btn.querySelector('span:last-child').textContent='播放中...';
    }
    if('speechSynthesis' in window){
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(w);
        u.lang='en-US';
        u.rate=0.85;
        u.onend=function(){
            if(btn){
                btn.classList.remove('playing');
                btn.querySelector('span:last-child').textContent='听发音';
            }
        };
        window.speechSynthesis.speak(u);
    }
}

function shuffle(a){
    return a.slice().sort(function(){return Math.random()-0.5;});
}

init();
