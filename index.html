<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>赛罗奥特曼英语大作战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 50%, #0f2040 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 15px; 
            position: relative; 
            z-index: 1; 
        }
        
        @media (min-width: 768px) {
            body { padding: 0; margin: 0; min-height: 100vh; }
            .container {
                max-width: 100%;
                width: 100%;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .card { width: 90%; max-width: 550px; }
        }
        
        .zero-header { text-align: center; padding: 15px 0; }
        .zero-icon { font-size: 80px; animation: zeroPulse 2s infinite; display: inline-block; filter: drop-shadow(0 0 20px rgba(0,200,255,0.8)); }
        @keyframes zeroPulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(0,200,255,0.8)); } 50% { transform: scale(1.08); filter: drop-shadow(0 0 30px rgba(255,100,0,0.8)); } }
        .title { font-size: 22px; font-weight: bold; text-align: center; background: linear-gradient(45deg, #00d4ff, #ff6b35, #ffd93d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 8px 0; }
        .subtitle { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 10px; }
        
        .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.15); }
        
        .score-panel { display: flex; justify-content: space-around; margin: 10px 0; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid rgba(0,200,255,0.3); }
        .score-item { text-align: center; }
        .score-value { font-size: 22px; font-weight: bold; color: #ffd93d; text-shadow: 0 0 10px rgba(255,217,61,0.5); }
        .score-label { font-size: 11px; color: #aaa; }
        
        .energy-bar-container { margin: 10px 0; }
        .energy-label { font-size: 12px; color: #00d4ff; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .energy-bar { height: 12px; background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; border: 1px solid rgba(0,200,255,0.3); }
        .energy-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff88, #ffd93d); border-radius: 6px; transition: width 0.5s; }
        
        .game-btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: all 0.3s; }
        .game-btn:active { transform: scale(0.95); }
        .btn-battle { background: linear-gradient(135deg, #ff6b35, #ff3366); }
        .btn-match { background: linear-gradient(135deg, #00d4ff, #0099ff); }
        .btn-hearing { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .btn-puzzle { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .btn-speak { background: linear-gradient(135deg, #f39c12, #e74c3c); }
        
        .unit-selector { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 10px 0; }
        .unit-btn { padding: 8px 4px; border: 2px solid rgba(0,200,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.05); color: white; font-size: 12px; cursor: pointer; }
        .unit-btn.active { background: linear-gradient(135deg, #00d4ff, #0099ff); border-color: #00d4ff; }
        
        .battle-arena { text-align: center; padding: 10px; }
        .vs-text { font-size: 20px; font-weight: bold; color: #ff3366; }
        .fighter { font-size: 55px; display: inline-block; }
        .hp-container { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .hp-section { text-align: center; flex: 1; }
        .hp-name { font-size: 13px; color: #00d4ff; margin-bottom: 3px; }
        .hp-name.monster { color: #ff6b6b; }
        .hp-bar-fight { height: 14px; background: #222; border-radius: 7px; overflow: hidden; margin: 3px 8px; }
        .hp-fill-zero { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff88); transition: width 0.5s; }
        .hp-fill-monster { height: 100%; background: linear-gradient(90deg, #ff3366, #ff6b6b); transition: width 0.5s; }
        
        .monster-info { text-align: center; padding: 8px; background: rgba(255,0,0,0.1); border-radius: 10px; margin: 8px 0; border: 1px solid rgba(255,0,0,0.3); }
        .monster-name { font-size: 15px; color: #ff6b6b; font-weight: bold; }
        .monster-desc { font-size: 11px; color: #aaa; margin-top: 3px; }
        
        .word-display { text-align: center; font-size: 28px; font-weight: bold; color: #00d4ff; margin: 12px 0; text-shadow: 0 0 15px rgba(0,212,255,0.6); }
        
        .voice-btn-container { text-align: center; margin: 8px 0; }
        .voice-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 20px; background: linear-gradient(135deg, #00d4ff, #00ff88); border: none; border-radius: 20px; color: #0a0a1a; font-size: 14px; font-weight: bold; cursor: pointer; }
        .voice-btn.playing { background: linear-gradient(135deg, #ffd93d, #ff6b35); animation: vPulse 0.5s infinite; }
        @keyframes vPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .speak-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 25px; background: linear-gradient(135deg, #f39c12, #e74c3c); border: none; border-radius: 25px; color: white; font-size: 15px; font-weight: bold; cursor: pointer; margin: 10px; }
        .speak-btn.recording { background: linear-gradient(135deg, #e74c3c, #c0392b); animation: recPulse 0.8s infinite; }
        @keyframes recPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.7); } 50% { box-shadow: 0 0 0 12px rgba(231,76,60,0); } }
        
        .option-btn { display: block; width: 100%; padding: 12px; margin: 5px 0; border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; font-size: 15px; background: rgba(255,255,255,0.08); color: white; cursor: pointer; }
        .option-btn.correct { background: rgba(39, 174, 96, 0.5); border-color: #27ae60; }
        .option-btn.wrong { background: rgba(231, 76, 60, 0.5); border-color: #e74c3c; }
        
        .progress { text-align: center; color: #aaa; margin: 6px 0; font-size: 12px; }
        .type-badge { display: inline-block; padding: 3px 10px; background: rgba(0,200,255,0.3); border-radius: 15px; font-size: 11px; margin: 3px 0; }
        
        .result { text-align: center; padding: 15px 0; }
        .result-title { font-size: 24px; margin: 10px 0; }
        .result-score { font-size: 45px; font-weight: bold; color: #ffd93d; }
        .result-stars { font-size: 26px; margin: 10px 0; }
        
        .hidden { display: none !important; }
        
        .attack-effect { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; animation: attAnim 0.5s forwards; z-index: 100; pointer-events: none; }
        @keyframes attAnim { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div id="menu" class="card">
            <div class="zero-header">
                <div class="zero-icon">🦸</div>
                <div class="title">⚔️ 赛罗奥特曼英语大作战 ⚔️</div>
                <div class="subtitle">打败怪兽，守护地球！</div>
            </div>
            <div class="score-panel">
                <div class="score-item"><div class="score-value" id="totalScore">0</div><div class="score-label">⚡能量</div></div>
                <div class="score-item"><div class="score-value" id="level">1</div><div class="score-label">🏆等级</div></div>
                <div class="score-item"><div class="score-value" id="monstersDefeated">0</div><div class="score-label">👹击败</div></div>
            </div>
            <div class="energy-bar-container">
                <div class="energy-label"><span>升级进度</span><span id="expText">0/100</span></div>
                <div class="energy-bar"><div class="energy-fill" id="expBar" style="width:0%"></div></div>
            </div>
            <div class="progress">选择战斗单元</div>
            <div class="unit-selector" id="unitSelector"></div>
            <button class="game-btn btn-battle" onclick="startBattle()">⚔️ 开始战斗</button>
            <button class="game-btn btn-speak" onclick="startSpeaking()">🎤 口语挑战</button>
            <button class="game-btn btn-match" onclick="startMatch()">🎯 单词配对</button>
            <button class="game-btn btn-hearing" onclick="startHearing()">🎧 听力挑战</button>
            <button class="game-btn btn-puzzle" onclick="startPuzzle()">🧩 单词拼图</button>
        </div>
        
        <div id="battleGame" class="card hidden">
            <div class="title">⚔️ 战斗模式</div>
            <div class="battle-arena">
                <div class="hp-container">
                    <div class="hp-section"><div class="hp-name">赛罗</div><div class="hp-bar-fight"><div class="hp-fill-zero" id="zeroHp" style="width:100%"></div></div></div>
                    <div class="vs-text">VS</div>
                    <div class="hp-section"><div class="hp-name monster" id="monsterHpName">怪兽</div><div class="hp-bar-fight"><div class="hp-fill-monster" id="monsterHp" style="width:100%"></div></div></div>
                </div>
                <div><span class="fighter">🦸</span><span class="vs-text" style="font-size:16px;margin:0 10px;">⚔️</span><span class="fighter" id="monsterEmoji">👾</span></div>
            </div>
            <div class="monster-info"><div class="monster-name" id="monsterName">小怪兽</div><div class="monster-desc" id="monsterDesc">打败它！</div></div>
            <div class="progress" id="battleProgress">回答问题攻击怪兽</div>
            <div class="type-badge" id="battleType">单词</div>
            <div class="word-display" id="battleWord">APPLE</div>
            <div class="voice-btn-container"><button class="voice-btn" id="battleVoiceBtn" onclick="playBattleVoice()"><span>🔊</span><span>听发音</span></button></div>
            <div id="battleOptions"></div>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <div id="speakingGame" class="card hidden">
            <div class="title">🎤 口语挑战</div>
            <div class="progress" id="speakingProgress">第 1 题</div>
            <div class="type-badge">单词</div>
            <div class="word-display" id="speakingWord">APPLE</div>
            <div style="text-align:center;color:#ffd93d;font-size:18px;" id="speakingMeaning">苹果</div>
            <div class="voice-btn-container"><button class="voice-btn" id="speakingVoiceBtn" onclick="playSpeakingVoice()"><span>🔊</span><span>听示范</span></button></div>
            <div style="text-align:center;margin:15px 0;"><button class="speak-btn" id="recordBtn" onclick="toggleRecord()"><span>🎙️</span><span id="recordText">点击录音</span></button></div>
            <div id="speechResult" style="text-align:center;padding:12px;background:rgba(0,0,0,0.3);border-radius:10px;margin:8px 0;"><div style="color:#aaa;font-size:13px;">点击按钮开始录音</div></div>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <div id="matchGame" class="card hidden">
            <div class="title">🎯 单词配对</div>
            <div class="progress" id="matchProgress">第 1 题</div>
            <div class="type-badge" id="matchType">单词</div>
            <div class="word-display" id="matchWord">APPLE</div>
            <div class="voice-btn-container"><button class="voice-btn" id="matchVoiceBtn" onclick="playMatchVoice()"><span>🔊</span><span>听发音</span></button></div>
            <div id="matchOptions"></div>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <div id="hearingGame" class="card hidden">
            <div class="title">🎧 听力挑战</div>
            <div class="progress" id="hearingProgress">第 1 题</div>
            <div class="type-badge" id="hearingType">句子</div>
            <div class="word-display" id="hearingSentence" style="font-size:20px;">Hello!</div>
            <div class="voice-btn-container"><button class="voice-btn" id="hearingVoiceBtn" onclick="playHearingVoice()"><span>🔊</span><span>再听一遍</span></button></div>
            <div id="hearingOptions"></div>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <div id="puzzleGame" class="card hidden">
            <div class="title">🧩 单词拼图</div>
            <div class="progress" id="puzzleProgress">第 1 题</div>
            <div class="type-badge">单词</div>
            <div style="text-align:center;color:#ffd93d;font-size:18px;" id="puzzleMeaning">苹果</div>
            <div class="word-display" id="puzzleLetters" style="font-size:24px;color:#ff6b35;">A P P L E</div>
            <div class="voice-btn-container"><button class="voice-btn" id="puzzleVoiceBtn" onclick="playPuzzleVoice()"><span>🔊</span><span>听发音</span></button></div>
            <input type="text" class="option-btn" id="puzzleInput" placeholder="输入英文单词" style="text-align:center;font-size:18px;">
            <button class="game-btn btn-puzzle" onclick="checkPuzzle()">🚀 发射！</button>
            <button class="game-btn" style="background:#555" onclick="backToMenu()">🏠 返回</button>
        </div>
        
        <div id="result" class="card hidden">
            <div class="result">
                <div style="font-size:55px;" id="resultEmoji">🏆</div>
                <div class="result-title" id="resultTitle">太棒了！</div>
                <div class="result-score" id="resultScore">+100</div>
                <div class="progress" id="resultMsg">正确率：10/10</div>
                <div class="result-stars" id="resultStars"></div>
                <button class="game-btn btn-battle" onclick="backToMenu()">🚀 继续战斗</button>
            </div>
        </div>
    </div>

<script>
// 词汇库
const ALL_WORDS = {
    1:{words:[["hello","你好"],["hi","嗨"],["goodbye","再见"],["good morning","早上好"],["name","名字"],["I","我"],["am","是"],["nice","高兴"],["meet","遇见"],["too","也"],["please","请"],["thank","谢谢"]],sentences:[["Hello!","你好！"],["What's your name?","你叫什么名字？"],["Nice to meet you.","很高兴认识你。"],["Goodbye!","再见！"]]},
    2:{words:[["one","一"],["two","二"],["three","三"],["four","四"],["five","五"],["six","六"],["seven","七"],["eight","八"],["nine","九"],["ten","十"]],sentences:[["How many?","有多少？"],["One, two, three!","一、二、三！"],["I can count.","我会数数。"]]},
    3:{words:[["red","红色"],["blue","蓝色"],["yellow","黄色"],["green","绿色"],["orange","橙色"],["purple","紫色"],["pink","粉色"],["black","黑色"],["white","白色"]],sentences:[["What color is it?","它是什么颜色？"],["It's red.","它是红色的。"],["I like blue.","我喜欢蓝色。"]]},
    4:{words:[["cat","猫"],["dog","狗"],["bird","小鸟"],["fish","鱼"],["rabbit","兔子"],["monkey","猴子"],["elephant","大象"],["tiger","老虎"],["lion","狮子"]],sentences:[["I have a cat.","我有一只猫。"],["The bird can fly.","小鸟会飞。"]]},
    5:{words:[["mum","妈妈"],["dad","爸爸"],["sister","姐妹"],["brother","兄弟"],["grandma","奶奶"],["grandpa","爷爷"],["family","家庭"]],sentences:[["This is my mum.","这是我的妈妈。"],["I have a brother.","我有一个兄弟。"]]},
    6:{words:[["apple","苹果"],["banana","香蕉"],["orange","橙子"],["milk","牛奶"],["water","水"],["juice","果汁"],["bread","面包"],["egg","鸡蛋"],["cake","蛋糕"]],sentences:[["I like apples.","我喜欢苹果。"],["I want some juice.","我想要一些果汁。"]]},
    7:{words:[["head","头"],["eye","眼睛"],["ear","耳朵"],["nose","鼻子"],["mouth","嘴巴"],["hand","手"],["finger","手指"],["arm","胳膊"],["leg","腿"]],sentences:[["Touch your head.","摸摸你的头。"],["I have two hands.","我有两只手。"]]},
    8:{words:[["run","跑"],["jump","跳"],["walk","走"],["sit","坐"],["stand","站"],["sleep","睡觉"],["eat","吃"],["drink","喝"],["play","玩"]],sentences:[["I can run.","我会跑。"],["Jump up high!","跳高点！"]]},
    9:{words:[["ball","球"],["toy","玩具"],["car","汽车"],["doll","娃娃"],["bear","熊"],["balloon","气球"],["kite","风筝"],["book","书"],["pen","笔"]],sentences:[["This is my new ball.","这是我的新球。"],["I have a teddy bear.","我有一个泰迪熊。"]]},
    10:{words:[["on","在...上"],["in","在...里"],["under","在...下"],["near","靠近"],["where","在哪里"],["table","桌子"],["chair","椅子"],["box","盒子"]],sentences:[["Where is the ball?","球在哪里？"],["It's on the table.","它在桌子上。"]]}
};

const MONSTERS = [
    {emoji:"👾",name:"小怪兽",desc:"外太空来的捣蛋鬼"},
    {emoji:"🤖",name:"机器人",desc:"邪恶科学家的作品"},
    {emoji:"👹",name:"红魔",desc:"火焰山的恶魔"},
    {emoji:"👺",name:"天狗",desc:"传说中的妖怪"},
    {emoji:"👻",name:"幽灵王",desc:"黑暗统治者"},
    {emoji:"💀",name:"骷髅将军",desc:"不死军团首领"},
    {emoji:"🎃",name:"南瓜魔王",desc:"万圣节恶灵"},
    {emoji:"👽",name:"外星霸主",desc:"银河系威胁"},
    {emoji:"🦖",name:"暴龙兽",desc:"远古恐龙复活"},
    {emoji:"🐉",name:"暗黑龙",desc:"邪恶巨龙"}
];

let score=0, level=1, exp=0, expNext=100, monstersDef=0;
let selectedUnits=[1], gameData=[], currentMonster=null;
let currentBattleText='', currentMatchText='', currentHearingText='', currentPuzzleText='', currentSpeakingText='';
let recognition=null, isRecording=false;

function init(){
    createStars();
    createUnits();
    updateUI();
    initSpeech();
}

function createStars(){
    for(let i=0;i<50;i++){
        let s=document.createElement('div');
        s.className='star';
        s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(Math.random()*3+1)+'px;height:'+(Math.random()*3+1)+'px';
        document.getElementById('stars').appendChild(s);
    }
}

function createUnits(){
    let c=document.getElementById('unitSelector');
    c.innerHTML='';
    for(let i=1;i<=10;i++){
        let b=document.createElement('button');
        b.className='unit-btn'+(selectedUnits.includes(i)?' active':'');
        b.textContent='U'+i;
        b.onclick=function(){
            if(selectedUnits.includes(i)){
                if(selectedUnits.length>1){
                    selectedUnits=selectedUnits.filter(function(u){return u!==i;});
                    b.classList.remove('active');
                }
            }else{
                selectedUnits.push(i);
                b.classList.add('active');
            }
        };
        c.appendChild(b);
    }
}

function getData(){
    let d=[];
    selectedUnits.forEach(function(u){
        d=d.concat(ALL_WORDS[u].words.map(function(w){return{type:'word',eng:w[0],chn:w[1]};}));
        d=d.concat(ALL_WORDS[u].sentences.map(function(s){return{type:'sentence',eng:s[0],chn:s[1]};}));
    });
    return shuffle(d);
}

function shuffle(a){
    return a.slice().sort(function(){return Math.random()-0.5;});
}

function updateUI(){
    document.getElementById('totalScore').textContent=score;
    document.getElementById('level').textContent=level;
    document.getElementById('monstersDefeated').textContent=monstersDef;
    document.getElementById('expText').textContent=exp+'/'+expNext;
    document.getElementById('expBar').style.width=(exp/expNext*100)+'%';
}

function addExp(n){
    exp+=n;
    if(exp>=expNext){
        exp-=expNext;
        level++;
        expNext=Math.floor(expNext*1.5);
        alert('🎉 升级到 '+level+' 级！');
    }
    updateUI();
}

function show(id){
    document.querySelectorAll('.card').forEach(function(c){c.classList.add('hidden');});
    document.getElementById(id).classList.remove('hidden');
}

function backToMenu(){
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    show('menu');
    updateUI();
}

function speak(t,btnId,cb){
    if(!t) return;
    let btn=btnId?document.getElementById(btnId):null;
    if(btn){
        btn.classList.add('playing');
        btn.querySelector('span:last-child').textContent='播放中...';
    }
    if('speechSynthesis' in window){
        window.speechSynthesis.cancel();
        let u=new SpeechSynthesisUtterance(t);
        u.lang='en-US';
        u.rate=0.85;
        u.onend=function(){
            if(btn){
                btn.classList.remove('playing');
                btn.querySelector('span:last-child').textContent='听发音';
            }
            if(cb) cb();
        };
        window.speechSynthesis.speak(u);
    }
}

function playBattleVoice(){speak(currentBattleText,'battleVoiceBtn');}
function playMatchVoice(){speak(currentMatchText,'matchVoiceBtn');}
function playHearingVoice(){speak(currentHearingText,'hearingVoiceBtn');}

// 战斗模式
let bIdx=0,bCorrect=0,mHp=100,zHp=100;

function startBattle(){
    bIdx=0;bCorrect=0;mHp=100;zHp=100;
    gameData=getData();
    let mi=Math.min(Math.floor(level/2),MONSTERS.length-1);
    currentMonster=MONSTERS[Math.floor(Math.random()*(mi+1))];
    document.getElementById('monsterEmoji').textContent=currentMonster.emoji;
    document.getElementById('monsterName').textContent=currentMonster.name;
    document.getElementById('monsterDesc').textContent=currentMonster.desc;
    document.getElementById('monsterHpName').textContent=currentMonster.name;
    updateHP();
    showBQ();
    show('battleGame');
}

function updateHP(){
    document.getElementById('monsterHp').style.width=mHp+'%';
    document.getElementById('zeroHp').style.width=zHp+'%';
}

function showBQ(){
    if(bIdx>=gameData.length||mHp<=0||zHp<=0){
        endBattle();
        return;
    }
    let item=gameData[bIdx];
    document.getElementById('battleType').textContent=item.type==='word'?'单词':'句子';
    currentBattleText=item.eng;
    document.getElementById('battleWord').textContent=item.eng;
    document.getElementById('battleProgress').textContent='攻击！第'+(bIdx+1)+'/'+gameData.length+'回合';
    let btn=document.getElementById('battleVoiceBtn');
    btn.classList.remove('playing');
    btn.querySelector('span:last-child').textContent='听发音';
    
    let wrong=gameData.filter(function(_,i){return i!==bIdx;}).map(function(x){return x.chn;});
    let opts=shuffle([item.chn].concat(wrong.slice(0,3)));
    let ct=document.getElementById('battleOptions');
    ct.innerHTML='';
    opts.forEach(function(o){
        let b=document.createElement('button');
        b.className='option-btn';
        b.textContent=o;
        b.onclick=function(){
            ct.querySelectorAll('.option-btn').forEach(function(x){x.onclick=null;});
            if(o===item.chn){
                b.classList.add('correct');
                mHp-=20;
                bCorrect++;
                showEff('💥');
            }else{
                b.classList.add('wrong');
                zHp-=15;
                showEff('💢');
            }
            updateHP();
            setTimeout(function(){bIdx++;showBQ();},800);
        };
        ct.appendChild(b);
    });
    setTimeout(function(){speak(item.eng,'battleVoiceBtn');},300);
}

function showEff(e){
    let d=document.createElement('div');
    d.className='attack-effect';
    d.textContent=e;
    document.body.appendChild(d);
    setTimeout(function(){d.remove();},500);
}

function endBattle(){
    let won=mHp<=0;
    let g=bCorrect*15;
    score+=g;
    if(won){
        monstersDef++;
        addExp(50+bCorrect*5);
    }
    document.getElementById('resultEmoji').textContent=won?'🏆':'💪';
    document.getElementById('resultTitle').textContent=won?'打败了 '+currentMonster.name+'！':'继续努力！';
    document.getElementById('resultScore').textContent='+'+g;
    document.getElementById('resultMsg').textContent='正确：'+bCorrect+'/'+gameData.length;
    document.getElementById('resultStars').innerHTML='⭐'.repeat(Math.ceil(bCorrect/3));
    updateUI();
    show('result');
}

// 口语挑战
let sIdx=0,sCorrect=0,sData=[];

function initSpeech(){
    let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){
        console.log('SpeechRecognition not supported');
        recognition=null;
        return;
    }
    try{
        recognition=new SpeechRecognition();
        recognition.lang='en-US';
        recognition.continuous=false;
        recognition.interimResults=false;
        recognition.maxAlternatives=1;
        
        recognition.onresult=function(e){
            console.log('Result', e.results);
            let transcript=e.results[0][0].transcript;
            let confidence=e.results[0][0].confidence||0.8;
            checkSpeech(transcript.toLowerCase(),confidence);
        };
        
        recognition.onerror=function(e){
            console.error('Speech error:', e.error);
            isRecording=false;
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('recordText').textContent='点击录音';
            let msg='错误: '+e.error;
            if(e.error==='not-allowed') msg='请允许麦克风权限';
            else if(e.error==='no-speech') msg='没听到声音，请重试';
            else if(e.error==='aborted') msg='已停止';
            document.getElementById('speechResult').innerHTML='<div style="color:#ff6b6b;">❌ '+msg+'</div>';
        };
        
        recognition.onend=function(){
            console.log('Speech ended');
            isRecording=false;
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('recordText').textContent='点击录音';
        };
        
        console.log('SpeechRecognition initialized');
    }catch(e){
        console.error('Init error:',e);
        recognition=null;
    }
}

function startSpeaking(){
    sIdx=0;sCorrect=0;
    sData=[];
    selectedUnits.forEach(function(u){
        sData=sData.concat(ALL_WORDS[u].words.map(function(w){return{eng:w[0],chn:w[1]};}));
    });
    sData=shuffle(sData);
    showSQ();
    show('speakingGame');
}

function showSQ(){
    if(sIdx>=sData.length){
        endSpeech();
        return;
    }
    let item=sData[sIdx];
    currentSpeakingText=item.eng;
    document.getElementById('speakingWord').textContent=item.eng;
    document.getElementById('speakingMeaning').textContent=item.chn;
    document.getElementById('speakingProgress').textContent='第 '+(sIdx+1)+'/'+sData.length+' 题';
    document.getElementById('speechResult').innerHTML='<div style="color:#aaa;font-size:13px;">点击按钮开始录音</div>';
    setTimeout(function(){speak(item.eng,'speakingVoiceBtn');},300);
}

function toggleRecord(){
    if(!recognition){
        document.getElementById('speechResult').innerHTML='<div style="color:#ff6b6b;">❌ 浏览器不支持语音识别<br><small>请用Chrome浏览器</small></div>';
        return;
    }
    
    if(isRecording){
        isRecording=false;
        try{recognition.stop();}catch(e){}
        document.getElementById('recordBtn').classList.remove('recording');
        document.getElementById('recordText').textContent='点击录音';
        return;
    }
    
    isRecording=true;
    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('recordText').textContent='点击停止';
    document.getElementById('speechResult').innerHTML='<div style="color:#ffd93d;">🎤 请说英文...</div>';
    
    try{
        recognition.start();
    }catch(e){
        console.error('Start error:',e);
        isRecording=false;
        document.getElementById('recordBtn').classList.remove('recording');
        document.getElementById('recordText').textContent='点击录音';
        document.getElementById('speechResult').innerHTML='<div style="color:#ff6b6b;">❌ 启动失败: '+e.message+'</div>';
    }
}

function checkSpeech(spoken,conf){
    if(!spoken||!currentSpeakingText) return;
    let correct=currentSpeakingText.toLowerCase();
    let isOk=spoken.includes(correct)||correct.includes(spoken);
    
    if(isOk&&conf>0.5){
        sCorrect++;
        score+=20;
        addExp(10);
        document.getElementById('speechResult').innerHTML='<div style="color:#27ae60;font-size:18px;">✅ 正确！</div><div style="color:#aaa;font-size:13px;">你说：'+spoken+'</div><div style="color:#00d4ff;font-size:12px;">准确度：'+Math.round(conf*100)+'%</div>';
    }else{
        document.getElementById('speechResult').innerHTML='<div style="color:#e74c3c;font-size:18px;">❌ 再试一次</div><div style="color:#aaa;font-size:13px;">你说：'+spoken+'</div><div style="color:#ffd93d;font-size:13px;">答案：'+correct+'</div>';
    }
    updateUI();
    setTimeout(function(){sIdx++;showSQ();},2000);
}

function endSpeech(){
    let g=sCorrect*20;
    score+=g;
    document.getElementById('resultEmoji').textContent='🎤';
    document.getElementById('resultTitle').textContent='口语挑战完成！';
    document.getElementById('resultScore').textContent='+'+g;
    document.getElementById('resultMsg').textContent='正确：'+sCorrect+'/'+sData.length;
    document.getElementById('resultStars').innerHTML='⭐'.repeat(Math.ceil(sCorrect/2));
    updateUI();
    show('result');
}

// 单词拼图
let pIdx=0,pCorrect=0,pData=[];

function startPuzzle(){
    pIdx=0;pCorrect=0;
    pData=[];
    selectedUnits.forEach(function(u){
        pData=pData.concat(ALL_WORDS[u].words.map(function(w){return{eng:w[0],chn:w[1]};}));
    });
    pData=shuffle(pData);
    showPQ();
    show('puzzleGame');
}

function showPQ(){
    if(pIdx>=pData.length){
        endPuzzle();
        return;
    }
    let item=pData[pIdx];
    currentPuzzleText=item.eng;
    document.getElementById('puzzleMeaning').textContent=item.chn;
    document.getElementById('puzzleProgress').textContent='第 '+(pIdx+1)+'/'+pData.length+' 题';
    document.getElementById('puzzleLetters').textContent=shuffle(item.eng.toUpperCase().split('')).join(' ');
    let btn=document.getElementById('puzzleVoiceBtn');
    btn.classList.remove('playing');
    btn.querySelector('span:last-child').textContent='听发音';
    document.getElementById('puzzleInput').value='';
    document.getElementById('puzzleInput').focus();
    setTimeout(function(){speak(item.eng,'puzzleVoiceBtn');},300);
}

function checkPuzzle(){
    let item=pData[pIdx];
    let inp=document.getElementById('puzzleInput').value.trim().toLowerCase();
    if(inp===item.eng){
        pCorrect++;
        score+=12;
        addExp(5);
        alert('✅ 正确！');
    }else{
        alert('❌ 答案：'+item.eng.toUpperCase());
    }
    updateUI();
    pIdx++;
    showPQ();
}

document.getElementById('puzzleInput').addEventListener('keypress',function(e){
    if(e.key==='Enter') checkPuzzle();
});

function endPuzzle(){
    let g=pCorrect*12;
    score+=g;
    document.getElementById('resultEmoji').textContent='🧩';
    document.getElementById('resultTitle').textContent=pCorrect>=pData.length*0.8?'太厉害了！':'不错！';
    document.getElementById('resultScore').textContent='+'+g;
    document.getElementById('resultMsg').textContent='正确：'+pCorrect+'/'+pData.length;
